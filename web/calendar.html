<body class="page-shell page-panel page-calendar">
<div class="wrap">
  <div class="hdr"><div class="title">万年历</div></div>
  <!-- Navigation -->
  <div class="nav">
    <a href="/"><span class="ni">🖼</span> 上传</a>
    <a href="/gallery"><span class="ni">🔁</span> 轮播</a>
    <a href="/weather"><span class="ni">🌤</span> 天气</a>
    <a href="/news"><span class="ni">📰</span> 新闻</a>
    <a href="/clock"><span class="ni">🕐</span> 时钟</a>
    <a href="/calendar" class="active"><span class="ni">🗓</span> 日历</a>
    <a href="/timetable"><span class="ni">📅</span> 课程表</a>
    <a href="/todo"><span class="ni">✅</span> 待办</a>
    <a href="/countdown"><span class="ni">⏳</span> 倒计时</a>
    <a href="/message"><span class="ni">💬</span> 文字留言</a>
    <a href="/board"><span class="ni">🎨</span> 画布留言</a>
    <a href="/codex"><span class="ni">📊</span> 额度</a>
    <a href="/config"><span class="ni">⚙</span> 设备配置</a>
  </div>

  <div class="card"><div class="hd"><div class="title" style="font-size:16px">万年历</div><div class="sub">显示月历视图，含公历、农历、节气、节日。周末和今日用红色高亮。</div></div><div class="bd">
    <div class="form-row"><label>年份</label><input type="number" id="calYear" min="1900" max="2100" placeholder="留空=当前年" style="max-width:140px"></div>
    <div class="form-row"><label>月份</label><input type="number" id="calMonth" min="1" max="12" placeholder="留空=当前月" style="max-width:140px"></div>
    <div class="row"><button class="btn" onclick="showCalendar()">显示万年历</button><button class="btn ghost sm" onclick="showCalendarPrev()">上月</button><button class="btn ghost sm" onclick="showCalendarNext()">下月</button></div><div class="log" id="calLog">就绪</div>
  </div></div>
  <footer class="epd-credit" role="contentinfo">由 <strong>喵喵</strong> 设计并开发 · 智能墨水屏终端 · <a href="https://gitee.com/gxp666111/miaomiao" target="_blank" rel="noopener noreferrer">源码仓库</a></footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}

function calLog(s,cls){const el=document.getElementById('calLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
async function showCalendar(){const y=parseInt(document.getElementById('calYear').value)||0;const m=parseInt(document.getElementById('calMonth').value)||0;calLog('正在渲染万年历…请稍候（约 20 秒刷新）');try{const body={};if(y) body.year=y;if(m) body.month=m;const r=await fetch('/calendar_show',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}));const j=await r.json();if(j.ok) calLog('万年历已显示在墨水屏上！','ok');else calLog('显示失败','bad');}catch(e){calLog('请求失败: '+e,'bad');}}
function calStep(delta){let y=parseInt(document.getElementById('calYear').value)||new Date().getFullYear();let m=parseInt(document.getElementById('calMonth').value)||new Date().getMonth()+1;m+=delta;if(m>12){m=1;y++;}if(m<1){m=12;y--;}document.getElementById('calYear').value=y;document.getElementById('calMonth').value=m;showCalendar();}
function showCalendarPrev(){calStep(-1);}function showCalendarNext(){calStep(1);}
(function(){const d=new Date();document.getElementById('calYear').value=d.getFullYear();document.getElementById('calMonth').value=d.getMonth()+1;})();
</script>
<script id="nav-scroll-fix-v1">
(function(){
  function centerActiveNav(){
    var nav=document.querySelector('.nav');
    if(!nav) return;
    var active=nav.querySelector('a.active,[aria-current="page"]');
    if(!active) {
      var here=location.pathname.replace(/\/$/,'')||'/';
      active=Array.prototype.find.call(nav.querySelectorAll('a[href]'),function(a){
        var path=new URL(a.getAttribute('href'),location.origin).pathname.replace(/\/$/,'')||'/';
        return path===here;
      });
      if(active) active.classList.add('active');
    }
    if(!active) return;
    requestAnimationFrame(function(){
      var left=active.offsetLeft-(nav.clientWidth-active.offsetWidth)/2;
      nav.scrollTo({left:Math.max(0,left),behavior:'auto'});
    });
  }
  window.addEventListener('DOMContentLoaded',centerActiveNav);
  window.addEventListener('load',centerActiveNav);
  window.addEventListener('pageshow',centerActiveNav);
})();
</script>
