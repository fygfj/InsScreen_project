<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>天气显示</title>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('epd_theme')||'loopy')})()</script>
<style>
[data-theme="loopy"]{--bg:#FFF0F5;--g1:rgba(255,182,203,.32);--g2:rgba(173,216,250,.28);--cd:#fff;--cb:rgba(255,155,179,.22);--ch:rgba(255,155,179,.10);--cs:0 6px 28px rgba(255,155,179,.13);--sf:rgba(255,236,245,.75);--sb:rgba(255,155,179,.20);--tx:#5A3050;--t2:rgba(120,70,100,.62);--ac:#FF9BB3;--a2:#8CC8F0;--ag:rgba(255,155,179,.28);--bt:#fff;--ok:#2E9E52;--er:#E53935;--wn:#E68A00;--hv:rgba(255,155,179,.10);--tg:rgba(255,155,179,.22)}
[data-theme="kitty"]{--bg:#FFF8F8;--g1:rgba(255,77,109,.18);--g2:rgba(255,215,0,.14);--cd:#fff;--cb:rgba(255,77,109,.17);--ch:rgba(255,77,109,.07);--cs:0 6px 28px rgba(255,77,109,.10);--sf:rgba(255,245,247,.8);--sb:rgba(255,77,109,.14);--tx:#4A1525;--t2:rgba(130,50,70,.58);--ac:#FF4D6D;--a2:#FFB347;--ag:rgba(255,77,109,.24);--bt:#fff;--ok:#2E9E52;--er:#D32F2F;--wn:#E68A00;--hv:rgba(255,77,109,.07);--tg:rgba(255,77,109,.15)}
[data-theme="lotso"]{--bg:#FBF0F3;--g1:rgba(183,70,120,.20);--g2:rgba(232,160,184,.18);--cd:#fff;--cb:rgba(183,70,120,.17);--ch:rgba(183,70,120,.07);--cs:0 6px 28px rgba(183,70,120,.10);--sf:rgba(251,238,244,.8);--sb:rgba(183,70,120,.14);--tx:#4A1428;--t2:rgba(120,40,70,.58);--ac:#B74678;--a2:#E8A0B8;--ag:rgba(183,70,120,.24);--bt:#fff;--ok:#2E9E52;--er:#C62828;--wn:#E68A00;--hv:rgba(183,70,120,.07);--tg:rgba(183,70,120,.15)}
*{box-sizing:border-box;transition:background-color .35s,border-color .35s,color .3s,box-shadow .35s}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:radial-gradient(1200px 800px at 20% -10%,var(--g1),transparent 60%),radial-gradient(900px 600px at 100% 0%,var(--g2),transparent 55%),var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px}.hdr{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap}.title{font-weight:800;letter-spacing:.2px;font-size:20px}.sub{color:var(--t2);font-size:13px;line-height:1.5}.nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}.nav a{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700;color:var(--tx);background:var(--cd);border:1px solid var(--cb);text-decoration:none;transition:all .2s;white-space:nowrap}.nav a:hover{border-color:var(--ac);background:var(--hv);transform:translateY(-1px)}.nav a.active{border-color:var(--ac);color:var(--ac);background:var(--hv);box-shadow:0 2px 8px var(--ag)}.nav .ni{font-size:15px}.card{position:relative;background:var(--cd);border:1px solid var(--cb);border-radius:18px;overflow:hidden;box-shadow:var(--cs);margin-bottom:16px}.card .hd{padding:16px 16px 10px;background:linear-gradient(180deg,var(--ch),transparent)}.card .bd{padding:16px}.kv{display:grid;grid-template-columns:110px 1fr;gap:8px 12px;font-size:13px;margin-bottom:12px}.k{color:var(--t2)}.v{font-weight:700}.ok{color:var(--ok)}.bad{color:var(--er)}.warn{color:var(--wn)}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.form-row{margin-bottom:12px}.form-row label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px}.btn{cursor:pointer;border:0;border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px;color:var(--bt);background:linear-gradient(135deg,var(--ac),var(--a2));box-shadow:0 6px 20px var(--ag);transition:filter .2s,transform .15s}.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}.btn.ghost{background:var(--sf);color:var(--tx);border:1px solid var(--cb);box-shadow:none}.btn.ghost:hover{background:var(--hv);border-color:var(--ac)}.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none;filter:none}.log{margin-top:10px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;background:var(--sf);border:1px solid var(--sb);border-radius:12px;padding:10px;min-height:48px;white-space:pre-wrap}select,input[type=text],input[type=password],input[type=number],textarea{padding:10px 12px;background:var(--sf);border:1px solid var(--sb);color:var(--tx);border-radius:12px;font-size:14px;width:100%;max-width:380px;font-family:inherit}textarea{max-width:100%}select:focus,input:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}.toggle{position:relative;display:inline-block;width:44px;height:24px;vertical-align:middle}.toggle input{opacity:0;width:0;height:0;position:absolute}.toggle .sl{position:absolute;cursor:pointer;inset:0;background:var(--tg);border-radius:24px;transition:.3s}.toggle .sl:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--cd);border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}.toggle input:checked+.sl{background:var(--ac)}.toggle input:checked+.sl:before{transform:translateX(20px)}.epd-credit{margin-top:20px;padding-top:14px;border-top:1px solid var(--cb);font-size:12px;color:var(--t2);text-align:center;line-height:1.6}.epd-credit strong{color:var(--tx);font-weight:700}.epd-credit a{color:var(--ac);font-weight:600;text-decoration:none}.epd-credit a:hover{text-decoration:underline}
@media(max-width:520px){.wrap{padding:16px 12px}.kv{grid-template-columns:92px 1fr}.nav a{padding:8px 10px;font-size:12px}}
/* Unified page navigation */
.nav{width:min(1180px,calc(100vw - 32px));display:flex;align-items:center;gap:8px;margin:0 0 18px 50%;padding:8px;overflow-x:auto;flex-wrap:nowrap;border-radius:18px;background:rgba(255,255,255,.60);border:1px solid var(--cb);box-shadow:0 8px 22px rgba(255,155,179,.10);scrollbar-width:none;-webkit-overflow-scrolling:touch;transform:translateX(-50%)}
.nav::-webkit-scrollbar{display:none}
.nav a{flex:0 0 auto;min-height:38px;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 13px;border-radius:12px;font-size:13px;font-weight:800;line-height:1;color:var(--tx);background:rgba(255,255,255,.78);border:1px solid var(--cb);text-decoration:none;white-space:nowrap;box-shadow:0 4px 12px rgba(255,155,179,.08)}
.nav .ni{width:18px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
.nav a:hover,.nav a.active{color:var(--ac);border-color:var(--ac);background:var(--hv);transform:translateY(-1px);box-shadow:0 0 0 2px var(--ag)}
@media(max-width:640px){.nav{width:calc(100vw - 24px);padding:7px;gap:7px;border-radius:16px}.nav a{min-height:36px;padding:0 11px;font-size:12px}}
</style>
<style id="unified-shell-v2">

body{overflow-y:scroll}
body .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important;margin:0 auto!important;padding:24px 0 36px!important}
body.page-upload .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important}
body.page-config .wrap,body.page-board .wrap{width:min(1380px,calc(100vw - 36px));max-width:1380px!important}
body.page-config .page{width:min(1180px,calc(100vw - 32px))!important;max-width:1180px!important;margin:24px auto 36px!important}
body.page-board{overflow:hidden}

body .hdr .title{line-height:1.25}

body .nav a{flex:0 0 88px!important;width:88px!important;min-width:88px!important;max-width:88px!important;padding:0 6px!important;gap:5px!important;overflow:hidden!important}

body.page-panel .card,body.page-task .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .wrap>.row,body.page-panel .wrap>.log,body.page-task .wrap>.row,body.page-task .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .card .hd,body.page-task .card .hd{padding:20px 22px 12px!important}

body.page-panel .card .bd{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 18px;align-items:start}
body.page-panel .card .bd>.kv,body.page-panel .card .bd>.row,body.page-panel .card .bd>.log{grid-column:1/-1}
body.page-panel .card .bd>.form-row{margin-bottom:0!important}
body.page-panel select,body.page-panel input[type=text],body.page-panel input[type=password],body.page-panel input[type=number],body.page-panel textarea{max-width:none!important}
body.page-panel #cityResults{max-width:none!important}
body.page-task .wrap>.row{margin-top:16px}
body.page-upload .card,body.page-config .card{width:100%}
body.page-gallery .card,body.page-timetable .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-gallery .wrap>.row,body.page-gallery .wrap>.log,body.page-timetable .wrap>.row,body.page-timetable .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body .epd-credit{width:100%;max-width:100%!important;margin-left:auto!important;margin-right:auto!important}
@media(max-width:760px){body .wrap,body.page-upload .wrap{width:calc(100vw - 24px);padding:16px 0 28px!important}body.page-config .page{width:calc(100vw - 24px)!important;margin-top:16px!important}body.page-panel .card .bd{grid-template-columns:1fr}body .nav{margin-bottom:16px!important;justify-content:flex-start!important}}
</style>
</head>
<body class="page-shell page-panel page-weather">
<div class="wrap">
  <div class="hdr"><div class="title">天气显示</div></div>
  <!-- Navigation -->
  <div class="nav">
    <a href="/"><span class="ni">🖼</span> 上传</a>
    <a href="/gallery"><span class="ni">🔁</span> 轮播</a>
    <a href="/weather" class="active"><span class="ni">🌤</span> 天气</a>
    <a href="/clock"><span class="ni">🕐</span> 时钟</a>
    <a href="/calendar"><span class="ni">🗓</span> 日历</a>
    <a href="/timetable"><span class="ni">📅</span> 课程表</a>
    <a href="/todo"><span class="ni">✅</span> 待办</a>
    <a href="/countdown"><span class="ni">⏳</span> 倒计时</a>
    <a href="/message"><span class="ni">💬</span> 文字留言</a>
    <a href="/board"><span class="ni">🎨</span> 画布留言</a>
    <a href="/codex"><span class="ni">📊</span> 额度</a>
    <a href="/config"><span class="ni">⚙</span> 设备配置</a>
  </div>

  <div class="card">
    <div class="hd"><div class="title" style="font-size:16px">天气显示</div><div class="sub">联网获取和风天气数据，在墨水屏显示天气、温度、日期等。需要 <a href="https://dev.qweather.com/" target="_blank" rel="noopener noreferrer" style="color:var(--ac);font-weight:700;text-decoration:none">和风天气</a> 免费 API Key。</div></div>
    <div class="bd">
      <div class="kv"><div class="k">天气状态</div><div class="v" id="w_status">-</div><div class="k">最新数据</div><div class="v" id="w_data">-</div></div>
      <div class="form-row"><label>启用天气</label><label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-top:4px"><span class="toggle"><input type="checkbox" id="wEnabled"><span class="sl"></span></span><span id="wLabel" style="font-size:13px">已关闭</span></label></div>
      <div class="form-row"><label>API Key（和风天气） <a href="https://dev.qweather.com/" target="_blank" rel="noopener noreferrer" style="color:var(--ac);font-weight:700;text-decoration:none">去获取</a></label><input type="text" id="wApiKey" placeholder="在 dev.qweather.com 获取"></div>
      <div class="form-row"><label>API Host（控制台 → 设置中查看）</label><input type="text" id="wApiHost" placeholder="xxx.re.qweatherapi.com"></div>
      <div class="form-row" style="position:relative"><label>搜索城市（输入后自动匹配城市和区县）</label><input type="text" id="wCitySearch" placeholder="输入城市名，如：北京、杭州、浦东" autocomplete="off" oninput="searchCity(this.value)"><div id="cityResults" style="display:none;position:absolute;z-index:10;left:0;right:0;max-width:380px;max-height:200px;overflow-y:auto;background:var(--cd);border:1px solid var(--ac);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);margin-top:2px"></div></div>
      <div class="form-row"><label>城市 Location ID</label><input type="text" id="wLocation" placeholder="101010100"></div>
      <div class="form-row"><label>城市名称（显示用）</label><input type="text" id="wCity" placeholder="北京"></div>
      <div class="form-row"><label>天气刷新策略</label><select id="wRefresh"><option value="0">仅手动</option><option value="30">自动：常开 30 分钟，低功耗按唤醒间隔</option></select></div>
      <div class="row"><button class="btn" onclick="saveWeather()">保存设置</button><button class="btn ghost sm" onclick="showWeather()">立即显示天气</button><button class="btn ghost sm" onclick="loadWeather()">刷新</button></div>
      <div class="log" id="wLog">加载中…</div>
    </div>
  </div>
  <footer class="epd-credit" role="contentinfo">由 <strong>喵喵</strong> 设计并开发 · 智能墨水屏终端 · <a href="https://gitee.com/gxp666111/miaomiao" target="_blank" rel="noopener noreferrer">源码仓库</a></footer>
</div>
<script>
function epdAuthHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u!=null&&p!=null&&u!==''&&p!=='')return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function epdFetchOpts(extra){extra=extra||{};var h=Object.assign({},epdAuthHeaders(),extra.headers||{});return Object.assign({},extra,{headers:h});}

function wLog(s,cls){const el=document.getElementById('wLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
async function fetchJsonRetry(url,options,retries,delayMs){retries=retries===undefined?4:retries;delayMs=delayMs===undefined?400:delayMs;let last;for(let i=0;i<retries;i++){try{const r=await fetch(url,epdFetchOpts(options));if(!r.ok) throw new Error('HTTP '+r.status);return await r.json();}catch(e){last=e;if(i<retries-1) await new Promise(function(res){setTimeout(res,delayMs*(i+1));});}}throw last;}
let weatherHydrating=false,weatherAutoSaveTimer=null,weatherSaveInFlight=false,weatherApiKeyConfigured=false;
var CITIES=[["北京","101010100"],["北京朝阳","101010300"],["北京海淀","101010200"],["上海","101020100"],["上海浦东","101021500"],["上海徐汇","101020600"],["广州","101280101"],["深圳","101280601"],["天津","101030100"],["重庆","101040100"],["杭州","101210101"],["南京","101190101"],["成都","101270101"],["武汉","101200101"],["西安","101110101"],["苏州","101190401"],["长沙","101250101"],["郑州","101180101"],["青岛","101120201"],["大连","101070201"],["沈阳","101070101"],["哈尔滨","101050101"],["长春","101060101"],["济南","101120101"],["合肥","101220101"],["福州","101230101"],["厦门","101230201"],["昆明","101290101"],["贵阳","101260101"],["南宁","101300101"],["南昌","101240101"],["太原","101100101"],["石家庄","101090101"],["呼和浩特","101080101"],["乌鲁木齐","101130101"],["兰州","101160101"],["银川","101170101"],["西宁","101150101"],["拉萨","101140101"],["海口","101310101"],["三亚","101310201"],["珠海","101280701"],["佛山","101280800"],["东莞","101281601"],["宁波","101210401"],["无锡","101190201"],["温州","101210701"],["常州","101191101"],["中山","101281701"],["惠州","101280301"],["烟台","101120501"],["潍坊","101120601"],["绍兴","101210501"],["台州","101210601"],["嘉兴","101210301"],["金华","101210901"],["泉州","101230501"],["保定","101090201"],["唐山","101090501"],["洛阳","101180901"],["襄阳","101200201"],["芜湖","101220301"],["徐州","101190801"],["扬州","101190601"],["南通","101190501"],["连云港","101190701"],["桂林","101300501"],["绵阳","101270401"],["遵义","101260201"],["柳州","101300301"],["香港","101320101"],["澳门","101330101"]];
function searchCity(q){var box=document.getElementById('cityResults');if(!q||q.length<1){box.style.display='none';return;}var results=CITIES.filter(function(c){return c[0].indexOf(q)>=0;});if(!results.length){box.style.display='none';return;}box.innerHTML=results.slice(0,10).map(function(c){return '<div style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--sb)" onclick="pickCity(\''+c[0]+'\',\''+c[1]+'\')">'+c[0]+' <span style="color:var(--t2);font-size:11px">'+c[1]+'</span></div>';}).join('');box.style.display='block';}
function pickCity(name,id){document.getElementById('wLocation').value=id;document.getElementById('wCity').value=name;document.getElementById('wCitySearch').value=name;document.getElementById('cityResults').style.display='none';}
document.addEventListener('click',function(e){if(!e.target.closest('#wCitySearch')&&!e.target.closest('#cityResults'))document.getElementById('cityResults').style.display='none';});
function collectWeatherCfg(){var cfg={enabled:document.getElementById('wEnabled').checked,api_key:document.getElementById('wApiKey').value.trim(),api_host:document.getElementById('wApiHost').value.trim().replace(/^https?:\/\//,''),location:document.getElementById('wLocation').value.trim(),city_name:document.getElementById('wCity').value.trim(),refresh_min:parseInt(document.getElementById('wRefresh').value)};if(!cfg.api_key&&weatherApiKeyConfigured) delete cfg.api_key;return cfg;}
function scheduleWeatherAutoSave(){if(weatherHydrating||weatherSaveInFlight) return;clearTimeout(weatherAutoSaveTimer);weatherAutoSaveTimer=setTimeout(function(){weatherAutoSaveTimer=null;var cfg=collectWeatherCfg();if(cfg.enabled&&(!(cfg.api_key||weatherApiKeyConfigured)||!cfg.api_host||!cfg.location)) return;saveWeather({silent:true});},2000);}
async function loadWeather(){try{weatherHydrating=true;const j=await fetchJsonRetry('/weather_config');weatherApiKeyConfigured=!!j.api_key_set;document.getElementById('wEnabled').checked=j.enabled;document.getElementById('wLabel').textContent=j.enabled?'已开启':'已关闭';document.getElementById('wApiKey').value=j.api_key||'';document.getElementById('wApiKey').placeholder=weatherApiKeyConfigured?'已保存，留空不修改':'和风天气 API Key';document.getElementById('wApiHost').value=j.api_host||'';document.getElementById('wLocation').value=j.location||'';document.getElementById('wCity').value=j.city_name||'';document.getElementById('wRefresh').value=String(j.refresh_min?30:0);const st=document.getElementById('w_status');if(j.enabled){st.textContent='运行中';st.className='v ok';}else{st.textContent='已关闭';st.className='v warn';}const wd=document.getElementById('w_data');if(j.has_data){wd.textContent=j.temp+'°C '+j.text+' ('+j.update_time+')';wd.className='v';}else{wd.textContent='暂无数据';wd.className='v warn';}wLog('设置已加载。');}catch(e){wLog('加载失败: '+e,'bad');}finally{weatherHydrating=false;}}
async function saveWeather(opts){opts=opts||{};var silent=opts.silent===true;var cfg=collectWeatherCfg();if(cfg.enabled&&(!(cfg.api_key||weatherApiKeyConfigured)||!cfg.api_host||!cfg.location)){if(!silent) wLog('请填写 API Key、API Host 和城市 ID','bad');return;}wLog(silent?'自动保存中…':'保存中…');weatherSaveInFlight=true;try{var j=await fetchJsonRetry('/weather_config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)},3,500);if(j.ok){wLog(silent?'已自动保存，设备正在拉取天气…':'设置已保存。设备将自动拉取天气。','ok');await loadWeather();}else wLog('保存失败','bad');}catch(e){wLog('请求失败: '+e,'bad');}finally{weatherSaveInFlight=false;}}
async function showWeather(){wLog('正在获取天气数据并渲染…墨水屏较慢，请耐心等待（最长约 2 分钟）');var ctrl=new AbortController();var t=setTimeout(function(){ctrl.abort();},120000);try{const r=await fetch('/weather_show',epdFetchOpts({method:'POST',signal:ctrl.signal}));const j=await r.json();if(j.ok){wLog('天气已显示在墨水屏上！','ok');await loadWeather();}else wLog('获取天气失败，请检查 API Key 和城市 ID 是否正确。','bad');}catch(e){wLog('请求失败: '+(e.name==='AbortError'?'超时（墨水屏仍在刷新可稍后再试）':e),'bad');}finally{clearTimeout(t);}}
(function(){['wEnabled','wApiKey','wApiHost','wLocation','wCity','wRefresh'].forEach(function(id){var el=document.getElementById(id);if(!el) return;var ev=(el.tagName==='SELECT'||el.type==='checkbox')?'change':'input';el.addEventListener(ev,function(){if(id==='wEnabled')document.getElementById('wLabel').textContent=el.checked?'已开启':'已关闭';scheduleWeatherAutoSave();});});})();
loadWeather();
</script>
</body>
</html>
