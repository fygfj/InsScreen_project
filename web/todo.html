<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>待办事项</title>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('epd_theme')||'loopy')})()</script>
<style>
[data-theme="loopy"]{
  --bg:#FFF0F5;--g1:rgba(255,182,203,.32);--g2:rgba(173,216,250,.28);
  --cd:#fff;--cb:rgba(255,155,179,.22);--ch:rgba(255,155,179,.10);--cs:0 6px 28px rgba(255,155,179,.13);
  --sf:rgba(255,236,245,.75);--sb:rgba(255,155,179,.20);
  --tx:#5A3050;--t2:rgba(120,70,100,.62);
  --ac:#FF9BB3;--a2:#8CC8F0;--ag:rgba(255,155,179,.28);
  --bt:#fff;--ok:#2E9E52;--er:#E53935;--wn:#E68A00;
  --hv:rgba(255,155,179,.10);--tg:rgba(255,155,179,.22);
}
[data-theme="kitty"]{
  --bg:#FFF8F8;--g1:rgba(255,77,109,.18);--g2:rgba(255,215,0,.14);
  --cd:#fff;--cb:rgba(255,77,109,.17);--ch:rgba(255,77,109,.07);--cs:0 6px 28px rgba(255,77,109,.10);
  --sf:rgba(255,245,247,.8);--sb:rgba(255,77,109,.14);
  --tx:#4A1525;--t2:rgba(130,50,70,.58);
  --ac:#FF4D6D;--a2:#FFB347;--ag:rgba(255,77,109,.24);
  --bt:#fff;--ok:#2E9E52;--er:#D32F2F;--wn:#E68A00;
  --hv:rgba(255,77,109,.07);--tg:rgba(255,77,109,.15);
}
[data-theme="lotso"]{
  --bg:#FBF0F3;--g1:rgba(183,70,120,.20);--g2:rgba(232,160,184,.18);
  --cd:#fff;--cb:rgba(183,70,120,.17);--ch:rgba(183,70,120,.07);--cs:0 6px 28px rgba(183,70,120,.10);
  --sf:rgba(251,238,244,.8);--sb:rgba(183,70,120,.14);
  --tx:#4A1428;--t2:rgba(120,40,70,.58);
  --ac:#B74678;--a2:#E8A0B8;--ag:rgba(183,70,120,.24);
  --bt:#fff;--ok:#2E9E52;--er:#C62828;--wn:#E68A00;
  --hv:rgba(183,70,120,.07);--tg:rgba(183,70,120,.15);
}
*{box-sizing:border-box;transition:background-color .35s,border-color .35s,color .3s}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:radial-gradient(1200px 800px at 20% -10%,var(--g1),transparent 60%),
  radial-gradient(900px 600px at 100% 0%,var(--g2),transparent 55%),var(--bg);
  color:var(--tx);min-height:100vh}
.wrap{max-width:700px;margin:0 auto;padding:20px 16px}
.hdr{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap}
.title{font-weight:800;letter-spacing:.2px;font-size:20px}
.pill{font-size:12px;color:var(--t2);padding:7px 11px;border:1px solid var(--cb);border-radius:999px;background:var(--sf);text-decoration:none}
.pill:hover{color:var(--ac);border-color:var(--ac)}
.nav{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.nav a{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:12px;font-size:13px;font-weight:700;
  color:var(--tx);background:var(--cd);border:1px solid var(--cb);text-decoration:none;transition:all .2s;white-space:nowrap}
.nav a:hover{border-color:var(--ac);background:var(--hv);transform:translateY(-1px)}
.nav a.active{border-color:var(--ac);color:var(--ac);background:var(--hv);box-shadow:0 2px 8px var(--ag)}
.nav .ni{font-size:15px}
.card{background:var(--cd);border:1px solid var(--cb);border-radius:18px;overflow:hidden;box-shadow:var(--cs);margin-bottom:14px}
.card .hd{padding:16px;background:linear-gradient(180deg,var(--ch),transparent);display:flex;justify-content:space-between;align-items:center}
.card .bd{padding:16px}
.sub{color:var(--t2);font-size:13px;line-height:1.5}
.btn{cursor:pointer;border:0;border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px;color:var(--bt);
  background:linear-gradient(135deg,var(--ac),var(--a2));box-shadow:0 6px 20px var(--ag);transition:filter .2s,transform .15s}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn.ghost{background:var(--sf);color:var(--tx);border:1px solid var(--cb);box-shadow:none}
.btn.ghost:hover{background:var(--hv);border-color:var(--ac)}
.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn.del{background:var(--er);box-shadow:none}
.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
.toggle input{display:none}
.toggle .track{width:44px;height:24px;background:var(--sb);border-radius:99px;position:relative;transition:background .3s}
.toggle .track::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .25s}
.toggle input:checked+.track{background:var(--ac)}
.toggle input:checked+.track::after{transform:translateX(20px)}
.log{margin-top:12px;padding:10px 12px;border-radius:12px;background:var(--sf);border:1px solid var(--cb);font-size:12px;color:var(--t2);max-height:120px;overflow-y:auto}
.log .ok{color:var(--ok)}.log .bad{color:var(--er)}
/* todo items */
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--cb);transition:opacity .2s}
.todo-item:last-child{border-bottom:none}
.todo-item.done .todo-text{text-decoration:line-through;opacity:.5}
.todo-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--ac);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.todo-check.checked{background:var(--ac);color:#fff}
.todo-text{flex:1;font-size:14px;padding:4px 0}
.todo-text input{width:100%;border:none;background:transparent;font-size:14px;color:var(--tx);outline:none;padding:2px 0}
.todo-pri{font-size:11px;padding:3px 8px;border-radius:8px;cursor:pointer;border:1px solid var(--cb);background:var(--sf)}
.todo-pri.p1{border-color:var(--wn);color:var(--wn)}
.todo-pri.p2{border-color:var(--er);color:var(--er);font-weight:700}
.todo-del{cursor:pointer;opacity:.4;font-size:18px;padding:0 4px}
.todo-del:hover{opacity:1;color:var(--er)}
.add-row{display:flex;gap:10px;padding:12px 14px}
.add-row input{flex:1;padding:10px 12px;border-radius:12px;border:1px solid var(--cb);background:var(--sf);color:var(--tx);font-size:14px;outline:none}
.add-row input:focus{border-color:var(--ac)}
.stat{font-size:13px;color:var(--t2)}
.epd-credit{margin-top:20px;padding-top:14px;border-top:1px solid var(--cb);font-size:12px;color:var(--t2);text-align:center;line-height:1.6}
.epd-credit strong{color:var(--tx);font-weight:700}
.epd-credit a{color:var(--ac);font-weight:600;text-decoration:none}
.epd-credit a:hover{text-decoration:underline}
/* Unified page navigation */
.nav{width:min(1180px,calc(100vw - 32px));display:flex;align-items:center;gap:8px;margin:0 0 18px 50%;padding:8px;overflow-x:auto;flex-wrap:nowrap;border-radius:18px;background:rgba(255,255,255,.60);border:1px solid var(--cb);box-shadow:0 8px 22px rgba(255,155,179,.10);scrollbar-width:none;-webkit-overflow-scrolling:touch;transform:translateX(-50%)}
.nav::-webkit-scrollbar{display:none}
.nav a{flex:0 0 auto;min-height:38px;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 13px;border-radius:12px;font-size:13px;font-weight:800;line-height:1;color:var(--tx);background:rgba(255,255,255,.78);border:1px solid var(--cb);text-decoration:none;white-space:nowrap;box-shadow:0 4px 12px rgba(255,155,179,.08)}
.nav .ni{width:18px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
.nav a:hover,.nav a.active{color:var(--ac);border-color:var(--ac);background:var(--hv);transform:translateY(-1px);box-shadow:0 0 0 2px var(--ag)}
@media(max-width:640px){.nav{width:calc(100vw - 24px);padding:7px;gap:7px;border-radius:16px}.nav a{min-height:36px;padding:0 11px;font-size:12px}}
</style>
<style id="unified-shell-v2">
/* Unified app shell v2: keep page size, nav, cards and form rhythm consistent. */
body{overflow-y:scroll}
body .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important;margin:0 auto!important;padding:24px 0 36px!important}
body.page-upload .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important}
body.page-config .wrap,body.page-board .wrap{width:min(1380px,calc(100vw - 36px));max-width:1380px!important}
body.page-config .page{width:min(1180px,calc(100vw - 32px))!important;max-width:1180px!important;margin:24px auto 36px!important}
body.page-board{overflow:hidden}
body .hdr{width:100%;min-height:46px;margin:0 0 16px!important;align-items:center}
body .hdr .title{line-height:1.25}
body .nav{width:min(1180px,100%)!important;max-width:100%!important;margin:0 auto 20px!important;transform:none!important;justify-content:center!important}
body .nav a{flex:0 0 88px!important;width:88px!important;min-width:88px!important;max-width:88px!important;padding:0 6px!important;gap:5px!important;overflow:hidden!important}
body .card{border-radius:16px!important}
body.page-panel .card,body.page-task .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .wrap>.row,body.page-panel .wrap>.log,body.page-task .wrap>.row,body.page-task .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .card .hd,body.page-task .card .hd{padding:20px 22px 12px!important}
body.page-panel .card .bd,body.page-task .card .bd{padding:18px 22px 22px!important}
body.page-panel .card .bd{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 18px;align-items:start}
body.page-panel .card .bd>.kv,body.page-panel .card .bd>.row,body.page-panel .card .bd>.log{grid-column:1/-1}
body.page-panel .card .bd>.form-row{margin-bottom:0!important}
body.page-panel select,body.page-panel input[type=text],body.page-panel input[type=password],body.page-panel input[type=number],body.page-panel textarea{max-width:none!important}
body.page-panel #cityResults{max-width:none!important}
body.page-task .wrap>.row{margin-top:16px}
body.page-upload .card,body.page-config .card{width:100%}
body.page-gallery .card,body.page-timetable .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-gallery .wrap>.row,body.page-gallery .wrap>.log,body.page-timetable .wrap>.row,body.page-timetable .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body .epd-credit{width:100%;max-width:100%!important;margin-left:auto!important;margin-right:auto!important}
@media(max-width:760px){body .wrap,body.page-upload .wrap{width:calc(100vw - 24px);padding:16px 0 28px!important}body.page-config .page{width:calc(100vw - 24px)!important;margin-top:16px!important}body.page-panel .card .bd{grid-template-columns:1fr}body .nav{margin-bottom:16px!important;justify-content:flex-start!important}}
</style>
</head>
<body class="page-shell page-task page-todo">
<div class="wrap">
  <div class="hdr">
    <div class="title">待办事项</div>
  </div>

  <div class="nav">
    <a href="/"><span class="ni">🖼</span> 上传</a>
    <a href="/gallery"><span class="ni">🔁</span> 轮播</a>
    <a href="/weather"><span class="ni">🌤</span> 天气</a>
    <a href="/clock"><span class="ni">🕐</span> 时钟</a>
    <a href="/calendar"><span class="ni">🗓</span> 日历</a>
    <a href="/timetable"><span class="ni">📅</span> 课程表</a>
    <a href="/todo" class="active"><span class="ni">✅</span> 待办</a>
    <a href="/countdown"><span class="ni">⏳</span> 倒计时</a>
    <a href="/message"><span class="ni">💬</span> 文字留言</a>
    <a href="/board"><span class="ni">🎨</span> 画布留言</a>
    <a href="/codex"><span class="ni">📊</span> 额度</a>
    <a href="/config"><span class="ni">⚙</span> 设备配置</a>
  </div>

  <div class="card">
    <div class="hd">
      <div style="display:flex;gap:14px;align-items:center">
        <label class="toggle"><input type="checkbox" id="chkEnabled"><span class="track"></span></label>
        <span class="sub">启用待办事项显示</span>
      </div>
      <span class="stat" id="stat"></span>
    </div>
    <div style="padding:0 16px 6px">
      <div style="height:4px;background:var(--sb);border-radius:2px;overflow:hidden">
        <div id="progBar" style="height:100%;background:var(--ac);border-radius:2px;transition:width .3s;width:0%"></div>
      </div>
    </div>
    <div class="bd">
      <div id="list"></div>
      <div class="add-row">
        <input type="text" id="newText" placeholder="添加新待办…" maxlength="47">
        <button class="btn sm" onclick="addItem()">添加</button>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="btn" onclick="save()">保存</button>
    <button class="btn ghost" onclick="showOnEpd()">推送到屏幕</button>
    <button class="btn ghost" onclick="clearDone()">清除已完成</button>
  </div>

  <div class="log" id="logBox"></div>
  <footer class="epd-credit" role="contentinfo">由 <strong>喵喵</strong> 设计并开发 · 智能墨水屏终端 · <a href="https://gitee.com/gxp666111/miaomiao" target="_blank" rel="noopener noreferrer">源码仓库</a></footer>
</div>

<script>
function epdAuthHeaders(){
  try{
    var u=localStorage.getItem('epd_auth_u');
    var p=localStorage.getItem('epd_auth_p');
    if(u!=null&&p!=null&&u!==''&&p!=='')
      return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};
  }catch(e){}
  return {};
}
function epdFetchOpts(extra){
  extra=extra||{};
  var h=Object.assign({},epdAuthHeaders(),extra.headers||{});
  return Object.assign({},extra,{headers:h});
}
let items=[];

function log(msg,cls){
  const b=document.getElementById('logBox');
  const d=document.createElement('div');
  d.className=cls||'';
  d.textContent=new Date().toLocaleTimeString()+' '+msg;
  b.prepend(d);
}

function updateStat(){
  const done=items.filter(i=>i.done).length;
  const total=items.length;
  const pct=total?Math.round(done*100/total):0;
  document.getElementById('stat').textContent=pct+'%  '+done+'/'+total+' 已完成';
  const bar=document.getElementById('progBar');
  if(bar) bar.style.width=pct+'%';
}

function renderList(){
  const el=document.getElementById('list');
  el.innerHTML='';
  items.forEach((it,i)=>{
    const div=document.createElement('div');
    div.className='todo-item'+(it.done?' done':'');
    div.innerHTML=`
      <div class="todo-check${it.done?' checked':''}" onclick="toggleDone(${i})">${it.done?'✓':''}</div>
      <div class="todo-text"><input value="${esc(it.text)}" onchange="items[${i}].text=this.value" maxlength="47"></div>
      <div class="todo-pri p${it.priority}" onclick="cyclePri(${i})">${['普通','重要','紧急'][it.priority]}</div>
      <div class="todo-del" onclick="delItem(${i})">×</div>
    `;
    el.appendChild(div);
  });
  updateStat();
}

function esc(s){return s.replace(/"/g,'&quot;').replace(/</g,'&lt;')}

function toggleDone(i){items[i].done=!items[i].done;renderList();silentSave()}
function cyclePri(i){items[i].priority=(items[i].priority+1)%3;renderList();silentSave()}
function delItem(i){items.splice(i,1);renderList();silentSave()}

async function silentSave(){
  const body=JSON.stringify({enabled:document.getElementById('chkEnabled').checked,items});
  try{await fetch('/todo',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body}))}catch(e){}
}

function addItem(){
  const inp=document.getElementById('newText');
  const t=inp.value.trim();
  if(!t)return;
  if(items.length>=16){log('最多16条','bad');return}
  items.push({text:t,done:false,priority:0});
  inp.value='';
  renderList();
}

document.getElementById('newText').addEventListener('keydown',e=>{
  if(e.key==='Enter')addItem();
});

async function load(){
  try{
    const r=await fetch('/todo.json',epdFetchOpts({}));
    const j=await r.json();
    document.getElementById('chkEnabled').checked=j.enabled;
    items=j.items||[];
    renderList();
    log('配置已加载','ok');
  }catch(e){log('加载失败: '+e,'bad')}
}

async function save(){
  const body=JSON.stringify({
    enabled:document.getElementById('chkEnabled').checked,
    items:items
  });
  try{
    const r=await fetch('/todo',epdFetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body}));
    const j=await r.json();
    log(j.ok?'保存成功':'保存失败',j.ok?'ok':'bad');
  }catch(e){log('保存失败: '+e,'bad')}
}

async function showOnEpd(){
  log('正在推送到屏幕…');
  try{
    const r=await fetch('/todo_show',epdFetchOpts({method:'POST'}));
    const j=await r.json();
    log(j.ok?'显示成功':'显示失败: '+(j.msg||''),j.ok?'ok':'bad');
  }catch(e){log('推送失败: '+e,'bad')}
}

function clearDone(){
  const before=items.length;
  items=items.filter(i=>!i.done);
  renderList();
  log('清除了 '+(before-items.length)+' 条已完成项','ok');
}

load();
</script>
</body>
</html>
