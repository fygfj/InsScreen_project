<head>
<meta charset="utf-8">

<title>热点资讯</title>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('epd_theme')||'loopy')})()</script>
<style>
[data-theme="loopy"]{--bg:#FFF0F5;--cd:#fff;--cb:rgba(255,155,179,.22);--ch:rgba(255,155,179,.10);--cs:0 6px 28px rgba(255,155,179,.13);--sf:rgba(255,236,245,.75);--sb:rgba(255,155,179,.20);--tx:#5A3050;--t2:rgba(120,70,100,.62);--ac:#FF9BB3;--a2:#8CC8F0;--ag:rgba(255,155,179,.28);--bt:#fff;--ok:#2E9E52;--er:#E53935;--wn:#E68A00;--hv:rgba(255,155,179,.10);--tg:rgba(255,155,179,.22)}
[data-theme="kitty"]{--bg:#FFF8F8;--cd:#fff;--cb:rgba(255,77,109,.17);--ch:rgba(255,77,109,.07);--cs:0 6px 28px rgba(255,77,109,.10);--sf:rgba(255,245,247,.8);--sb:rgba(255,77,109,.14);--tx:#4A1525;--t2:rgba(130,50,70,.58);--ac:#FF4D6D;--a2:#FFB347;--ag:rgba(255,77,109,.24);--bt:#fff;--ok:#2E9E52;--er:#D32F2F;--wn:#E68A00;--hv:rgba(255,77,109,.07);--tg:rgba(255,77,109,.15)}
[data-theme="lotso"]{--bg:#FBF0F3;--cd:#fff;--cb:rgba(183,70,120,.17);--ch:rgba(183,70,120,.07);--cs:0 6px 28px rgba(183,70,120,.10);--sf:rgba(251,238,244,.8);--sb:rgba(183,70,120,.14);--tx:#4A1428;--t2:rgba(120,40,70,.58);--ac:#B74678;--a2:#E8A0B8;--ag:rgba(183,70,120,.24);--bt:#fff;--ok:#2E9E52;--er:#C62828;--wn:#E68A00;--hv:rgba(183,70,120,.07);--tg:rgba(183,70,120,.15)}
[data-theme="dark"]{--bg:#111318;--g1:rgba(93,169,255,.16);--g2:rgba(255,155,179,.10);--cd:#1A1D24;--cb:rgba(255,255,255,.12);--ch:rgba(255,255,255,.06);--cs:0 8px 28px rgba(0,0,0,.35);--sf:rgba(255,255,255,.07);--sb:rgba(255,255,255,.14);--tx:#F2F5F8;--t2:rgba(226,232,240,.68);--ac:#7CC7FF;--a2:#FF9BB3;--ag:rgba(124,199,255,.24);--bt:#0F131A;--ok:#59D98E;--er:#FF6B7A;--wn:#FFC766;--hv:rgba(124,199,255,.12);--tg:rgba(255,255,255,.16);--deco:"*"}
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:24px 16px 36px}
.hdr{display:flex;justify-content:space-between;align-items:end;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.title{font-size:22px;font-weight:800}
.sub{font-size:13px;color:var(--t2);line-height:1.5}
.nav{display:flex;gap:8px;overflow-x:auto;padding:8px;margin-bottom:18px;border-radius:18px;background:rgba(255,255,255,.6);border:1px solid var(--cb);box-shadow:0 8px 22px rgba(255,155,179,.10)}
.nav a{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 13px;border-radius:12px;background:rgba(255,255,255,.78);border:1px solid var(--cb);color:var(--tx);text-decoration:none;font-weight:800;font-size:13px;white-space:nowrap}
.nav a.active,.nav a:hover{color:var(--ac);border-color:var(--ac);background:var(--hv)}
.ni{font-size:15px}
.card{background:var(--cd);border:1px solid var(--cb);border-radius:16px;box-shadow:var(--cs);overflow:hidden;margin-bottom:16px}
.hd{padding:16px 16px 10px;background:linear-gradient(180deg,var(--ch),transparent)}
.bd{padding:16px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 18px}
.kv{display:grid;grid-template-columns:96px 1fr;gap:8px 10px;font-size:13px}
.k{color:var(--t2)}.v{font-weight:700}.ok{color:var(--ok)}.warn{color:var(--wn)}.bad{color:var(--er)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px}
input[type=text],select{width:100%;max-width:440px;padding:10px 12px;background:var(--sf);border:1px solid var(--sb);color:var(--tx);border-radius:12px;font-size:14px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}
.toggle{position:relative;display:inline-block;width:44px;height:24px;vertical-align:middle}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.sl{position:absolute;inset:0;background:var(--tg);border-radius:24px;transition:.3s}
.sl:before{content:"";position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:var(--cd);border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.sl{background:var(--ac)}
.toggle input:checked+.sl:before{transform:translateX(20px)}
.btn{cursor:pointer;border:0;border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px;color:var(--bt);background:linear-gradient(135deg,var(--ac),var(--a2));box-shadow:0 6px 20px var(--ag)}
.btn.ghost{background:var(--sf);color:var(--tx);border:1px solid var(--cb);box-shadow:none}
.btn:disabled{opacity:.58;cursor:not-allowed;box-shadow:none}
.log{margin-top:10px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;background:var(--sf);border:1px solid var(--sb);border-radius:12px;padding:10px;min-height:44px;white-space:pre-wrap}
.news-list{display:grid;gap:12px}
.news-item{padding:12px 14px;border:1px solid var(--cb);border-radius:14px;background:rgba(255,255,255,.55)}
.news-item .t{font-weight:800;line-height:1.45;margin-bottom:6px}
.news-item .s{font-size:13px;line-height:1.5;color:var(--t2);white-space:pre-wrap}
.news-item .m{margin-top:8px;font-size:12px;color:var(--t2);display:flex;gap:12px;flex-wrap:wrap}
[data-theme="dark"] body{background:radial-gradient(900px 560px at 18% -8%,var(--g1),transparent 60%),radial-gradient(760px 520px at 100% 0,var(--g2),transparent 55%),var(--bg)}
[data-theme="dark"] .nav{background:#171B22;border-color:rgba(255,255,255,.12);box-shadow:0 10px 28px rgba(0,0,0,.28)}
[data-theme="dark"] .nav a{background:#20242D;color:#E8EEF6;border-color:rgba(255,255,255,.14);box-shadow:none}
[data-theme="dark"] .nav a.active,[data-theme="dark"] .nav a:hover{background:#202938;color:#9FD7FF;border-color:#7CC7FF}
[data-theme="dark"] .card{background:#171B22;border-color:rgba(255,255,255,.12);box-shadow:0 12px 34px rgba(0,0,0,.30)}
[data-theme="dark"] .hd{background:linear-gradient(180deg,rgba(255,255,255,.06),transparent)}
[data-theme="dark"] .news-item{background:#20242D;border-color:rgba(255,255,255,.14)}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] option,[data-theme="dark"] .log{background:#10141B;color:#F2F5F8;border-color:rgba(255,255,255,.18)}
[data-theme="dark"] input::placeholder{color:rgba(226,232,240,.48)}
[data-theme="dark"] .btn.ghost{background:#20242D;color:#E8EEF6;border-color:rgba(255,255,255,.16)}
@media(max-width:720px){.grid{grid-template-columns:1fr}.kv{grid-template-columns:82px 1fr}.wrap{padding:16px 12px 28px}}
</style>

<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="title">热点资讯</div>
      <div class="sub">只显示关键新闻信息，按条轮播，不放图片。</div>
    </div>
    <div class="sub" id="topTime">-</div>
  </div>
  <div class="nav">
    <a href="/"><span class="ni">📤</span> 上传</a>
    <a href="/gallery"><span class="ni">🔁</span> 轮播</a>
    <a href="/news" class="active"><span class="ni">📰</span> 新闻</a>
    <a href="/weather"><span class="ni">🌤</span> 天气</a>
    <a href="/clock"><span class="ni">🕐</span> 时钟</a>
    <a href="/calendar"><span class="ni">🗓</span> 日历</a>
    <a href="/config"><span class="ni">⚙</span> 配置</a>
  </div>

  <div class="card">
    <div class="hd">
      <div class="title" style="font-size:16px">新闻配置</div>
      <div class="sub">填写聚合数据 API Key，程序会自动生成新闻请求地址。</div>
    </div>
    <div class="bd">
      <div class="grid">
        <div>
          <div class="form-row">
            <label>总开关</label>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
              <span class="toggle"><input type="checkbox" id="nEnabled"><span class="sl"></span></span>
              <span id="nLabel" style="font-size:13px">已关闭</span>
            </label>
          </div>
          <div class="form-row"><label>API Key <a href="https://www.juhe.cn/apiexplorer/235" target="_blank" rel="noopener noreferrer" style="color:var(--ac);font-weight:700;text-decoration:none">去获取</a></label><input type="password" id="nApiKey" maxlength="64" autocomplete="off" placeholder="请输入聚合数据 API Key"></div>
          <div class="form-row"><label>新闻分类</label>
            <select id="nCategory">
              <option value="top">推荐</option><option value="guonei">国内</option><option value="guoji">国际</option>
              <option value="yule">娱乐</option><option value="tiyu">体育</option><option value="junshi">军事</option>
              <option value="keji">科技</option><option value="caijing">财经</option><option value="youxi">游戏</option>
              <option value="qiche">汽车</option><option value="jiankang">健康</option>
            </select>
          </div>
          <div class="form-row"><label>返回数量</label>
            <select id="nPageSize">
              <option value="3">3 条（单页）</option><option value="6">6 条（两页，推荐）</option>
              <option value="1">1 条</option><option value="2">2 条</option><option value="4">4 条</option><option value="5">5 条</option>
            </select>
          </div>
          <div class="form-row"><label>刷新间隔</label>
            <select id="nRefresh">
              <option value="60">1 分钟</option><option value="300">5 分钟</option><option value="600">10 分钟</option>
              <option value="1800">30 分钟</option><option value="3600">1 小时</option><option value="7200">2 小时</option>
            </select>
          </div>
          <div class="row">
            <button class="btn" onclick="saveNews()">保存设置</button>
            <button class="btn ghost" id="nRefreshBtn" onclick="refreshNews()">立即刷新</button>
          </div>
        </div>
        <div>
          <div class="kv">
            <div class="k">状态</div><div class="v" id="nStatus">-</div>
            <div class="k">API Key</div><div class="v" id="nKeyStatus">-</div>
            <div class="k">新闻分类</div><div class="v" id="nCategoryStatus">-</div>
            <div class="k">来源标题</div><div class="v" id="nTitle">-</div>
            <div class="k">更新时间</div><div class="v" id="nUpdated">-</div>
            <div class="k">当前条目</div><div class="v" id="nIndex">-</div>
          </div>
        </div>
      </div>
      <div class="log" id="nLog">加载中…</div>
    </div>
  </div>

  <div class="card">
    <div class="hd">
      <div class="title" style="font-size:16px">当前新闻</div>
      <div class="sub">4.2 英寸屏幕每页显示 3 条，6 条新闻分两页轮播。</div>
    </div>
    <div class="bd">
      <div class="news-list" id="newsList"></div>
    </div>
  </div>
</div>

<script>
function authHeaders(){try{var u=localStorage.getItem('epd_auth_u');var p=localStorage.getItem('epd_auth_p');if(u&&p)return {'Authorization':'Basic '+btoa(unescape(encodeURIComponent(u+':'+p)))};}catch(e){}return {};}
function fetchOpts(extra){extra=extra||{};return Object.assign({},extra,{headers:Object.assign({},authHeaders(),extra.headers||{})});}
function logMsg(s,cls){var el=document.getElementById('nLog');el.className='log'+(cls?' '+cls:'');el.textContent=s;}
function newsKeyCacheKey(){return 'epd_news_api_key';}
function loadCachedNewsKey(){try{return localStorage.getItem(newsKeyCacheKey())||'';}catch(e){return '';}}
function saveCachedNewsKey(key){try{if(key)localStorage.setItem(newsKeyCacheKey(),key);}catch(e){}}
var newsRefreshTimer=null;
function setNewsRefreshCooldown(sec){
  var btn=document.getElementById('nRefreshBtn');
  if(!btn)return;
  if(newsRefreshTimer){clearInterval(newsRefreshTimer);newsRefreshTimer=null;}
  var left=sec;
  btn.disabled=true;
  function tick(){
    if(left<=0){btn.disabled=false;btn.textContent='立即刷新';clearInterval(newsRefreshTimer);newsRefreshTimer=null;return;}
    btn.textContent='刷新中 '+left+'s';
    left--;
  }
  tick();
  newsRefreshTimer=setInterval(tick,1000);
}
function newsEpdBusy(err){
  err=String(err||'').toLowerCase();
  return err.indexOf('epd')>=0||err.indexOf('ready')>=0||err.indexOf('invalid_state')>=0||err.indexOf('timeout')>=0;
}
function fmtSec(sec){sec=parseInt(sec||0);if(sec>=3600)return (sec/3600)+' 小时';if(sec>=60)return (sec/60)+' 分钟';return sec+' 秒';}
function categoryName(v){var m={top:'推荐',guonei:'国内',guoji:'国际',yule:'娱乐',tiyu:'体育',junshi:'军事',keji:'科技',caijing:'财经',youxi:'游戏',qiche:'汽车',jiankang:'健康'};return m[v]||v||'推荐';}
function clearNode(el){while(el.firstChild) el.removeChild(el.firstChild);}
function addItem(list,it,idx,total){
  var d=document.createElement('div');d.className='news-item';
  var t=document.createElement('div');t.className='t';t.textContent=it.title||'未命名新闻';
  var s=document.createElement('div');s.className='s';s.textContent=it.summary||'暂无摘要';
  var m=document.createElement('div');m.className='m';
  var source=document.createElement('span');source.textContent='来源：'+(it.source||'未知');
  var time=document.createElement('span');time.textContent=it.time?('时间：'+it.time):'';
  var seq=document.createElement('span');seq.textContent='第 '+(idx+1)+' / '+total+' 条';
  m.appendChild(source);if(it.time)m.appendChild(time);m.appendChild(seq);
  d.appendChild(t);d.appendChild(s);d.appendChild(m);list.appendChild(d);
}
async function loadNews(){
  try{
    var r=await fetch('/news_config',fetchOpts());
    var j=await r.json();
    document.getElementById('nEnabled').checked=!!j.enabled;
    document.getElementById('nLabel').textContent=j.enabled?'已开启':'已关闭';
    var keyInput=document.getElementById('nApiKey');
    var cachedKey=loadCachedNewsKey();
    keyInput.value=cachedKey;
    keyInput.dataset.keySet=j.api_key_set?'1':'0';
    keyInput.placeholder=j.api_key_set?('设备已保存 '+(j.api_key_masked||'****')+'，留空不修改'):'请输入聚合数据 API Key';
    document.getElementById('nCategory').value=j.category||'top';
    document.getElementById('nPageSize').value=String(j.page_size||6);
    document.getElementById('nRefresh').value=String(j.refresh_sec||1800);
    document.getElementById('nStatus').textContent=j.has_data?'运行中':'暂无数据';
    document.getElementById('nStatus').className='v '+(j.has_data?'ok':'warn');
    document.getElementById('nKeyStatus').textContent=j.api_key_set?('设备已保存 '+(j.api_key_masked||'')):(cachedKey?'浏览器已记忆，保存后写入设备':'未设置');
    document.getElementById('nKeyStatus').className='v '+(j.api_key_set?'ok':'warn');
    document.getElementById('nCategoryStatus').textContent=categoryName(j.category)+' · '+(j.page_size||6)+' 条';
    document.getElementById('nTitle').textContent=j.page_title||'热点资讯';
    document.getElementById('nUpdated').textContent=j.updated_at||'-';
    var start=(j.current_index||0)+1;
    var end=Math.min(start+2,j.item_count||0);
    document.getElementById('nIndex').textContent=(j.has_data?('第 '+start+'-'+end+' / '+(j.item_count||0)+' 条'):'-');
    var list=document.getElementById('newsList');
    clearNode(list);
    if(j.items&&j.items.length){for(var i=0;i<j.items.length;i++) addItem(list,j.items[i],i,j.items.length);}
    else{
      var empty=document.createElement('div');
      empty.className='news-item';
      empty.innerHTML='<div class="t">暂无新闻</div><div class="s">请先填写新闻源并保存。</div>';
      list.appendChild(empty);
    }
    document.getElementById('topTime').textContent='已加载';
    logMsg('新闻设置已加载。');
  }catch(e){logMsg('加载失败: '+e,'bad');}
}
async function saveNews(){
  var keyInput=document.getElementById('nApiKey');
  var key=keyInput.value.trim();
  var cfg={enabled:document.getElementById('nEnabled').checked,category:document.getElementById('nCategory').value,page_size:parseInt(document.getElementById('nPageSize').value,10),refresh_sec:parseInt(document.getElementById('nRefresh').value,10)};
  if(key)cfg.api_key=key;
  if(cfg.enabled&&!key&&keyInput.dataset.keySet!=='1'){logMsg('请先填写聚合数据 API Key','bad');return;}
  logMsg('保存中…');
  try{
    var r=await fetch('/news_config',fetchOpts({method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)}));
    var j=await r.json();
    if(j.ok){saveCachedNewsKey(key);keyInput.dataset.keySet='1';logMsg('设置已保存。','ok');await loadNews();}
    else logMsg('保存失败: '+(j.msg||'unknown'),'bad');
  }catch(e){logMsg('保存失败: '+e,'bad');}
}
async function refreshNews(){
  var btn=document.getElementById('nRefreshBtn');
  if(btn&&btn.disabled)return;
  logMsg('正在刷新并上屏…');
  try{
    var r=await fetch('/news_show',fetchOpts({method:'POST'}));
    var j=await r.json();
    if(j.ok){logMsg('新闻已刷新。','ok');setTimeout(loadNews,800);}
    else if(newsEpdBusy(j.err||j.msg)){logMsg('屏幕刷新中，请稍后再试。','warn');setNewsRefreshCooldown(20);}
    else logMsg('刷新失败: '+(j.err||j.msg||'unknown'),'bad');
  }catch(e){logMsg('刷新失败: '+e,'bad');}
}
document.getElementById('nEnabled').addEventListener('change',function(){document.getElementById('nLabel').textContent=this.checked?'已开启':'已关闭';});
loadNews();
</script>
<script id="nav-scroll-fix-v1">
(function(){
  function centerActiveNav(){
    var nav=document.querySelector('.nav');
    if(!nav) return;
    var active=nav.querySelector('a.active,[aria-current="page"]');
    if(!active) {
      var here=location.pathname.replace(/\/$/,'')||'/';
      active=Array.prototype.find.call(nav.querySelectorAll('a[href]'),function(a){
        var path=new URL(a.getAttribute('href'),location.origin).pathname.replace(/\/$/,'')||'/';
        return path===here;
      });
      if(active) active.classList.add('active');
    }
    if(!active) return;
    requestAnimationFrame(function(){
      var left=active.offsetLeft-(nav.clientWidth-active.offsetWidth)/2;
      nav.scrollTo({left:Math.max(0,left),behavior:'auto'});
    });
  }
  window.addEventListener('DOMContentLoaded',centerActiveNav);
  window.addEventListener('load',centerActiveNav);
  window.addEventListener('pageshow',centerActiveNav);
})();
</script>
