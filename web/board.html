async function loadImageData(name) {
    if (CANVAS_IMAGES[name]) return CANVAS_IMAGES[name];
    try {
        const r = await fetch('/canvas_image?name=' + encodeURIComponent(name), epdFetchOpts());
        if (!r.ok) return null;
        const buf = new Uint8Array(await r.arrayBuffer());
        if (buf.length < 5) return null;
        const w = buf[0] | (buf[1] << 8);
        const h = buf[2] | (buf[3] << 8);
        const stride = Math.ceil(w / 8);
        const planeLen = stride * h;
        let flags = 0, off = 4;
        if (buf.length >= 8 + planeLen * 2 &&
            buf[4] === 0x42 && buf[5] === 0x57 && (buf[6] & 1)) {
            flags = buf[6];
            off = 8;
        }
        const data = buf.slice(off, off + planeLen);
        const red = (flags & 1) ? buf.slice(off + planeLen, off + planeLen * 2) : null;
        CANVAS_IMAGES[name] = {w, h, data, red, bwr:!!red, _cacheKey: name};
        Object.keys(BMP_CACHE).filter(k=>k.startsWith(name+'_')||k===name).forEach(k=>delete BMP_CACHE[k]);
        return CANVAS_IMAGES[name];
    } catch(e) { return null; }
}

async function ensureImagesForLayout() {
    const names = [...new Set(elements.filter(e=>e.type==='image').map(e=>e.name))];
    for (const name of names) await loadImageData(name);  // 串行，避免ESP32并发连接限制
}

function buildImageGrid() {
    const grid = document.getElementById('image-list-grid');
    if (!grid) return;
    grid.innerHTML = '';
    if (userImageNames.length === 0) {
        grid.innerHTML = '<div class="hint" style="grid-column:1/-1">暂无图片，点击上传</div>';
        return;
    }
    userImageNames.forEach(name => {
        const div = document.createElement('div');
        div.className = 'icon-item' + (name === selectedImageName ? ' sel' : '');
        div.dataset.name = name;
        const imgData = CANVAS_IMAGES[name];
        const pc = document.createElement('canvas');
        pc.width = pc.height = 48;
        pc.style.display = 'block'; pc.style.margin = '0 auto 2px';
        pc.style.imageRendering = 'pixelated';
        const pcx = pc.getContext('2d');
        pcx.fillStyle = '#f0f0f0'; pcx.fillRect(0, 0, 48, 48);
        if (imgData) {
            const sc = Math.min(48 / imgData.w, 48 / imgData.h);
            const dw = Math.round(imgData.w * sc), dh = Math.round(imgData.h * sc);
            drawBmpRaw(pcx, imgData, Math.floor((48-dw)/2), Math.floor((48-dh)/2), dw, dh);
        } else {
            pcx.fillStyle = '#888'; pcx.font = '10px sans-serif';
            pcx.fillText(name.slice(0, 6), 2, 28);
        }
        div.appendChild(pc);
        const lbl = document.createElement('div');
        lbl.className = 'iname'; lbl.textContent = name.slice(0, 7); lbl.title = name;
        div.appendChild(lbl);
        div.onclick = () => {
            document.querySelectorAll('#image-list-grid .icon-item').forEach(e=>e.classList.remove('sel'));
            div.classList.add('sel');
            selectedImageName = name;
            if (CANVAS_IMAGES[name]) showImagePreview(CANVAS_IMAGES[name]);
            if (selected >= 0 && selected < elements.length && elements[selected].type === 'image') {
                elements[selected].name = name;
                render(); updateProps(); snapshot();
            }
        };
        grid.appendChild(div);
    });
}

function uploadImageClick() { document.getElementById('image-file-input').click(); }

function invalidateImageCache(name) {
    Object.keys(BMP_CACHE).filter(k=>k.startsWith(name+'_')||k===name).forEach(k=>delete BMP_CACHE[k]);
}

function showImagePreview(imgData) {
    const pw = document.getElementById('img-preview');
    pw.width = imgData.w; pw.height = imgData.h;
    drawBmpRaw(pw.getContext('2d'), imgData, 0, 0, imgData.w, imgData.h);
    document.getElementById('img-preview-wrap').style.display = '';
}

async function uploadCanvasImageData(name, imgData, silent) {
    const body = encodeCanvasImageBody(imgData);
    const r = await fetch('/canvas_image_upload?name=' + encodeURIComponent(name), epdFetchOpts({
        method: 'POST', headers: {'Content-Type': 'application/octet-stream'}, body
    }));
    if (!r.ok) throw new Error('上传失败: ' + r.status);
    if (!userImageNames.includes(name)) userImageNames.push(name);
    if (!silent) toast('图片已上传: ' + name);
}

async function refreshActiveImagePreview() {
    if (!activeImageSource || !activeImageSource.file || !activeImageSource.name) return;
    if (_imgPreviewBusy) { _imgPreviewQueued = true; return; }
    _imgPreviewBusy = true;
    try {
        const name = activeImageSource.name;
        const imgData = await imageFileTo1bit(activeImageSource.file, EPD_W, EPD_H);
        imgData._cacheKey = name;
        CANVAS_IMAGES[name] = imgData;
        invalidateImageCache(name);
        showImagePreview(imgData);
        buildImageGrid();
        render();
    } catch(e) {
        toast('实时预览失败: ' + e.message);
    } finally {
        _imgPreviewBusy = false;
        if (_imgPreviewQueued) {
            _imgPreviewQueued = false;
            refreshActiveImagePreview();
        }
    }
}

function scheduleActiveImagePreview() {
    saveImageConvertOptions();
    if (!activeImageSource || activeImageSource.name !== selectedImageName) {
        if (selectedImageName) toast('实时预览需要重新上传一次原图');
        return;
    }
    clearTimeout(_imgPreviewTimer);
    _imgPreviewTimer = setTimeout(() => refreshActiveImagePreview(), 80);
}

async function applyActiveImageParams() {
    if (!activeImageSource || activeImageSource.name !== selectedImageName) {
        toast('请先重新上传一次原图，再应用参数');
        return;
    }
    await refreshActiveImagePreview();
    const imgData = CANVAS_IMAGES[selectedImageName];
    if (!imgData) return;
    try {
        await uploadCanvasImageData(selectedImageName, imgData, true);
        toast('图片参数已应用到设备素材');
    } catch(e) {
        toast('应用失败: ' + e.message);
    }
}

function encodeCanvasImageBody(imgData) {
    const stride = Math.ceil(imgData.w / 8);
    const planeLen = stride * imgData.h;
    const hasRed = !!imgData.red;
    const body = new Uint8Array((hasRed ? 8 : 4) + planeLen * (hasRed ? 2 : 1));
    body[0] = imgData.w & 0xff; body[1] = (imgData.w >> 8) & 0xff;
    body[2] = imgData.h & 0xff; body[3] = (imgData.h >> 8) & 0xff;
    if (hasRed) {
        body[4] = 0x42; body[5] = 0x57; body[6] = 1; body[7] = 0;
        body.set(imgData.data, 8);
        body.set(imgData.red, 8 + planeLen);
    } else {
        body.set(imgData.data, 4);
    }
    return body;
}

document.getElementById('image-file-input').onchange = async function() {
    const f = this.files[0]; if (!f) return;
    const defName = f.name.replace(/\.[^.]+$/, '').replace(/[^A-Za-z0-9_-]/g, '_').slice(0, 20);
    const name = prompt('图片名称（字母/数字/下划线/减号）：', defName);
    if (!name || !/^[A-Za-z0-9_-]+$/.test(name)) { toast('名称无效'); this.value = ''; return; }
    toast('正在转换图片…');
    try {
        const imgData = await imageFileTo1bit(f, EPD_W, EPD_H);
        imgData._cacheKey = name;
        CANVAS_IMAGES[name] = imgData;
        activeImageSource = {name, file:f};
        invalidateImageCache(name);

        showImagePreview(imgData);
        await uploadCanvasImageData(name, imgData, false);
        selectedImageName = name;
        buildImageGrid();
    } catch(e) { toast('处理失败: ' + e.message); }
    this.value = '';
};

async function deleteSelectedImage() {
    if (!selectedImageName) { toast('请先选择图片'); return; }
    if (!confirm('删除图片 ' + selectedImageName + ' ？')) return;
    try {
        await fetch('/canvas_image_delete?name=' + encodeURIComponent(selectedImageName), epdFetchOpts({method:'POST'}));
        delete CANVAS_IMAGES[selectedImageName];
        userImageNames = userImageNames.filter(n => n !== selectedImageName);
        selectedImageName = null;
        document.getElementById('img-preview-wrap').style.display = 'none';
        buildImageGrid(); toast('已删除');
    } catch(e) { toast('删除失败'); }
}

/* ═══════════════════════════════════════════════
   颜色工具
═══════════════════════════════════════════════ */
function elCssColor(el) { return CSS_COLORS[el.color] || CSS_COLORS[0]; }
function elFgRGB(el)    { return FG_COLORS[el.color]  || FG_COLORS[0];  }

/* ═══════════════════════════════════════════════
   渲染
═══════════════════════════════════════════════ */
function render() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,canvas.width, canvas.height);

    elements.forEach((el, i) => {
        if (el.hidden) return;
        ctx.save();
        renderElement(ctx, el, SCALE);
        ctx.restore();
    });
    // 选中框画到 overlay，不污染主画布
    renderOverlaySelection();
}

function renderOverlaySelection() {
    if (drawStart) return; // 绘制预览中，overlay 由 drawPreview 管理
    if (pencilPts) {
        // 铅笔绘制中 overlay 由铅笔路径管理，只清空不画选中框
        return;
    }
    octx.clearRect(0, 0, overlay.width, overlay.height);
    /* 网格 */
    if (gridOn) {
        octx.save();
        octx.strokeStyle = 'rgba(100,100,200,0.18)';
        octx.lineWidth = 1;
        const gs = GRID_SIZE * SCALE;
        for (let x = gs; x < overlay.width; x += gs) {
            octx.beginPath(); octx.moveTo(x, 0); octx.lineTo(x, overlay.height); octx.stroke();
        }
        for (let y = gs; y < overlay.height; y += gs) {
            octx.beginPath(); octx.moveTo(0, y); octx.lineTo(overlay.width, y); octx.stroke();
        }
        octx.restore();
    }
    octx.save();
    octx.strokeStyle = 'rgba(229,57,53,.28)';
    octx.lineWidth = 1;
    octx.setLineDash([7,5]);
    octx.beginPath(); octx.moveTo(EPD_W*SCALE/2, 0); octx.lineTo(EPD_W*SCALE/2, overlay.height); octx.stroke();
    octx.beginPath(); octx.moveTo(0, EPD_H*SCALE/2); octx.lineTo(overlay.width, EPD_H*SCALE/2); octx.stroke();
    octx.restore();
    if (selected >= 0 && selected < elements.length) {
        drawAlignmentGuides(elements[selected]);
        drawSelectionBox(elements[selected]);
    }
}

function drawAlignmentGuides(el) {
    if (!mouseDown || tool !== 'select' || !dragStart) return;
    const b = getBounds(el);
    const xs = [b.x, b.x + b.w / 2, b.x + b.w];
    const ys = [b.y, b.y + b.h / 2, b.y + b.h];
    const guidesX = [EPD_W / 2], guidesY = [EPD_H / 2];
    elements.forEach(other => {
        if (other === el || other.hidden) return;
        const ob = getBounds(other);
        guidesX.push(ob.x, ob.x + ob.w / 2, ob.x + ob.w);
        guidesY.push(ob.y, ob.y + ob.h / 2, ob.y + ob.h);
    });
    octx.save();
    octx.strokeStyle = 'rgba(46,158,82,.65)';
    octx.lineWidth = 1;
    octx.setLineDash([4,4]);
    for (const gx of guidesX) {
        if (xs.some(x => Math.abs(x - gx) <= 3)) {
            const sx = Math.round(gx * SCALE) + 0.5;
            octx.beginPath(); octx.moveTo(sx, 0); octx.lineTo(sx, overlay.height); octx.stroke();
        }
    }
    for (const gy of guidesY) {
        if (ys.some(y => Math.abs(y - gy) <= 3)) {
            const sy = Math.round(gy * SCALE) + 0.5;
            octx.beginPath(); octx.moveTo(0, sy); octx.lineTo(overlay.width, sy); octx.stroke();
        }
    }
    octx.restore();
}

function boardTextFont(scale, zoom) {
    return boardTextFontFor(null, scale, zoom);
}

function boardTextFontFor(el, scale, zoom) {
    const h = boardTextPx(scale) * zoom;
    const weight = (el && el.weight) || '600';
    const custom = ((el && el.customFont) || '').trim().replace(/"/g, '');
    const family = (el && el.fontFamily) ||
        '"LXGW 975 Yuan SC","霞鹜975圆体 SC","LXGW WenKai","Microsoft YaHei UI","Microsoft YaHei",sans-serif';
    return `${weight} ${h}px ${custom ? `"${custom}", ` : ''}${family}`;
}

function boardTextPx(scale) {
    const sizes = [16, 24, 32, 40, 48, 56];
    const idx = Math.max(1, Math.min(6, scale || 1)) - 1;
    return sizes[idx];
}

function boardTextScaleLabel(scale) {
    const idx = Math.max(1, Math.min(6, scale || 1));
    return `${idx}档 / ${boardTextPx(idx)}px`;
}

function boardMeasureTextLine(text, scale, zoom) {
    const mctx = boardMeasureTextLine.ctx ||
                 (boardMeasureTextLine.ctx = document.createElement('canvas').getContext('2d'));
    mctx.font = boardTextFont(scale, zoom);
    return mctx.measureText(text || '').width / zoom;
}

function boardMeasureTextLineFor(text, el, zoom) {
    const mctx = boardMeasureTextLine.ctx ||
                 (boardMeasureTextLine.ctx = document.createElement('canvas').getContext('2d'));
    mctx.font = boardTextFontFor(el, el && el.scale || 1, zoom);
    return mctx.measureText(text || '').width / zoom;
}

function renderElement(ctx2d, el, sc) {
    const cc = CSS_COLORS[el.color] || '#1e1e1e';
    // 白色元素在白色背景上加浅灰轮廓，保证可见
    const isWhite = el.color === 2;
    ctx2d.fillStyle   = cc;
    ctx2d.strokeStyle = cc;
    const sw = Math.max(1, el.sw || 1) * sc;
    switch(el.type) {
        case 'text': {
            const charH = boardTextPx(el.scale || 1) * sc;
            ctx2d.font = boardTextFontFor(el, el.scale || 1, sc);
            ctx2d.textBaseline = 'top';
            ctx2d.fillStyle = cc;
            (el.text||'').split('\n').forEach((ln,li)=>{
                ctx2d.fillText(ln, el.x*sc, el.y*sc + li*charH);
            });
            ctx2d.textBaseline = 'alphabetic';
            break;
        }
        case 'rect': {
            const x=el.x*sc, y=el.y*sc, w=(el.w||1)*sc, h=(el.h||1)*sc;
            const r = Math.min((el.radius||0)*sc, w/2, h/2);
            ctx2d.beginPath();
            if (r > 0) ctx2d.roundRect(x, y, w, h, r);
            else ctx2d.rect(x, y, w, h);
            if (el.fill) {
                ctx2d.fill();
                if (isWhite) { ctx2d.strokeStyle='#bbb'; ctx2d.lineWidth=1; ctx2d.stroke(); }
            } else {
                ctx2d.lineWidth=sw;
                const ox=sw/2;
                ctx2d.beginPath();
                if (r > 0) ctx2d.roundRect(x+ox, y+ox, w-sw, h-sw, Math.max(0,r-ox));
                else ctx2d.rect(x+ox, y+ox, w-sw, h-sw);
                ctx2d.stroke();
                if (isWhite) { ctx2d.strokeStyle='#bbb'; ctx2d.lineWidth=1; ctx2d.beginPath(); ctx2d.rect(x,y,w,h); ctx2d.stroke(); }
            }
            break;
        }
        case 'ellipse': {
            const rx=(el.rx||10)*sc, ry=(el.ry||10)*sc;
            ctx2d.beginPath();
            ctx2d.ellipse(el.x*sc, el.y*sc, Math.max(1,rx), Math.max(1,ry), 0, 0, Math.PI*2);
            if (el.fill) ctx2d.fill();
            else { ctx2d.lineWidth=sw; ctx2d.stroke(); }
            break;
        }
        case 'line': {
            ctx2d.lineWidth=sw; ctx2d.lineCap='round';
            ctx2d.beginPath();
            ctx2d.moveTo(el.x1*sc, el.y1*sc);
            ctx2d.lineTo(el.x2*sc, el.y2*sc);
            ctx2d.stroke();
            break;
        }
        case 'path': {
            const pts = el.pts||[];
            if (pts.length < 2) break;
            ctx2d.lineWidth=sw; ctx2d.lineCap='round'; ctx2d.lineJoin='round';
            ctx2d.beginPath();
            ctx2d.moveTo(pts[0][0]*sc, pts[0][1]*sc);
            for (let k=1; k<pts.length; k++) ctx2d.lineTo(pts[k][0]*sc, pts[k][1]*sc);
            ctx2d.stroke();
            break;
        }
        case 'image': {
            const imgData = CANVAS_IMAGES[el.name];
            const dw = (el.dw || (imgData ? imgData.w : 32)) * sc;
            const dh = (el.dh || (imgData ? imgData.h : 32)) * sc;
            if (imgData) {
                drawBmpRaw(ctx2d, imgData, el.x * sc, el.y * sc, dw, dh, cc);
            } else {
                ctx2d.strokeStyle = '#999'; ctx2d.lineWidth = 1; ctx2d.setLineDash([4,3]);
                ctx2d.strokeRect(el.x*sc, el.y*sc, dw, dh);
                ctx2d.setLineDash([]);
                ctx2d.fillStyle = '#aaa'; ctx2d.font = `${10*sc}px monospace`;
                ctx2d.fillText(el.name||'img', el.x*sc+4, el.y*sc+16*sc);
            }
            break;
        }
        case 'icon': {
            const sc2 = (el.scale||1)*sc;
            const [r,g,b] = elFgRGB(el);
            const bmp = BUILTIN_BITMAPS[el.name];
            if (bmp) drawBmpOnCtx(ctx2d, bmp, el.x*sc, el.y*sc, sc2, r, g, b);
            else {
                ctx2d.strokeStyle=cc; ctx2d.lineWidth=1;
                ctx2d.strokeRect(el.x*sc, el.y*sc, 16*sc2, 16*sc2);
                ctx2d.fillStyle=cc; ctx2d.font=`${Math.max(8,sc2*4)}px monospace`;
                ctx2d.fillText(el.name.slice(0,4), el.x*sc+2, el.y*sc+16*sc2*0.7);
            }
            break;
        }
    }
}

/* 选中框 + 控制手柄（绘制到 overlay，不影响主画布内容） */
function drawSelectionBox(el) {
    const b = getBounds(el);
    const s = SCALE;
    octx.save();
    octx.setLineDash([6,3]);
    octx.lineWidth = 2;
    octx.strokeStyle = '#0b84ff';
    octx.strokeRect(b.x*s-4, b.y*s-4, b.w*s+8, b.h*s+8);
    octx.setLineDash([]);
    octx.strokeStyle = 'rgba(255,255,255,.95)';
    octx.lineWidth = 1;
    octx.strokeRect(b.x*s-7, b.y*s-7, b.w*s+14, b.h*s+14);
    const label = ({text:'文字',rect:'矩形',ellipse:'椭圆',line:'直线',path:'笔迹',icon:'图标',image:'图片'}[el.type] || el.type);
    octx.font = 'bold 12px sans-serif';
    const tw = octx.measureText(label).width + 14;
    const lx = Math.max(2, b.x*s - 4);
    const ly = Math.max(2, b.y*s - 24);
    octx.fillStyle = '#0b84ff';
    octx.fillRect(lx, ly, tw, 18);
    octx.fillStyle = '#fff';
    octx.fillText(label, lx + 7, ly + 13);
    octx.fillStyle = '#e53935';
    octx.beginPath();
    octx.arc((b.x+b.w)*s + 12, b.y*s - 12, 8, 0, Math.PI*2);
    octx.fill();
    octx.fillStyle = '#fff';
    octx.font = 'bold 14px sans-serif';
    octx.fillText('×', (b.x+b.w)*s + 8, b.y*s - 7);
    // 手柄
    const hs = getHandles(el);
    hs.forEach(h => {
        octx.fillStyle = '#fff';
        octx.fillRect(h.cx*s - 5, h.cy*s - 5, 10, 10);
        octx.strokeStyle = '#0b84ff';
        octx.lineWidth = 2;
        octx.strokeRect(h.cx*s - 5, h.cy*s - 5, 10, 10);
    });
    octx.restore();
}

/* ═══════════════════════════════════════════════
   Bounds & 控制手柄
═══════════════════════════════════════════════ */
function getBounds(el) {
    switch(el.type) {
        case 'text': {
            const sc=el.scale||1, lines=(el.text||' ').split('\n');
            const w = lines.reduce((m,l)=>Math.max(m,boardMeasureTextLineFor(l, el, 1)),0);
            const h = lines.length * boardTextPx(sc);
            return {x:el.x, y:el.y, w:Math.max(16,w), h:Math.max(8,h)};
        }
        case 'rect':    return {x:el.x, y:el.y, w:el.w||1, h:el.h||1};
        case 'ellipse': return {x:el.x-(el.rx||10), y:el.y-(el.ry||10), w:(el.rx||10)*2, h:(el.ry||10)*2};
        case 'line':    return {
            x:Math.min(el.x1,el.x2), y:Math.min(el.y1,el.y2),
            w:Math.max(4,Math.abs(el.x2-el.x1)), h:Math.max(4,Math.abs(el.y2-el.y1))
        };
        case 'path': {
            const pts=el.pts||[[0,0]];
            const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
            const x=Math.min(...xs),y=Math.min(...ys);
            return {x,y,w:Math.max(4,Math.max(...xs)-x),h:Math.max(4,Math.max(...ys)-y)};
        }
        case 'icon': { const sc=el.scale||1; return {x:el.x,y:el.y,w:16*sc,h:16*sc}; }
        case 'image': {
            const imgData = CANVAS_IMAGES[el.name];
            const dw = el.dw || (imgData ? imgData.w : 32);
            const dh = el.dh || (imgData ? imgData.h : 32);
            return {x:el.x, y:el.y, w:dw, h:dh};
        }
        default: return {x:el.x||0,y:el.y||0,w:20,h:20};
    }
}

/* 控制手柄定义：{id, cx, cy} 坐标为元素坐标系 */
function getHandles(el) {
    switch(el.type) {
        case 'rect': {
            const {x,y,w,h}=el;
            return [
                {id:'tl',cx:x,    cy:y   },{id:'tr',cx:x+w,cy:y   },
                {id:'bl',cx:x,    cy:y+h },{id:'br',cx:x+w,cy:y+h },
                {id:'tm',cx:x+w/2,cy:y   },{id:'bm',cx:x+w/2,cy:y+h},
                {id:'ml',cx:x,    cy:y+h/2},{id:'mr',cx:x+w,cy:y+h/2},
            ];
        }
        case 'ellipse': {
            const {x,y}=el, rx=el.rx||10, ry=el.ry||10;
            return [
                {id:'rx+',cx:x+rx,cy:y   },{id:'rx-',cx:x-rx,cy:y   },
                {id:'ry+',cx:x,   cy:y+ry},{id:'ry-',cx:x,   cy:y-ry},
            ];
        }
        case 'line':
            return [{id:'p1',cx:el.x1,cy:el.y1},{id:'p2',cx:el.x2,cy:el.y2}];
        case 'image': {
            const b = getBounds(el);
            return [
                {id:'tl',cx:b.x,       cy:b.y      },
                {id:'tr',cx:b.x+b.w,   cy:b.y      },
                {id:'bl',cx:b.x,       cy:b.y+b.h  },
                {id:'br',cx:b.x+b.w,   cy:b.y+b.h  },
            ];
        }
        default: return [];
    }
}

/* 命中测试 */
function hitTest(ex, ey) {
    for (let i=elements.length-1; i>=0; i--) {
        const el = elements[i];
        if (el.hidden || el.locked) continue;
        const b = getBounds(el);
        if (ex>=b.x && ex<=b.x+b.w && ey>=b.y && ey<=b.y+b.h) return i;
    }
    return -1;
}

const HANDLE_R = 6; // px（屏幕像素，未 /SCALE）
function hitHandle(el, sx, sy) {
    // sx,sy 是屏幕坐标（已乘 SCALE）
    const hs = getHandles(el);
    for (const h of hs) {
        const dx = sx - h.cx*SCALE, dy = sy - h.cy*SCALE;
        if (Math.abs(dx) <= HANDLE_R && Math.abs(dy) <= HANDLE_R) return h.id;
    }
    return null;
}

/* ═══════════════════════════════════════════════
   事件
═══════════════════════════════════════════════ */
function bindEvents() {
    document.querySelectorAll('.tool-btn').forEach(btn => {
        btn.onclick = () => {
            switchTool(btn.dataset.tool);
        };
    });
    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.onclick = () => {
            color = parseInt(btn.dataset.color);
            document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('sel'));
            btn.classList.add('sel');
            if (selected>=0) { elements[selected].color=color; render(); snapshot(); }
        };
    });

    // 文字
    document.getElementById('txt-scale').oninput = function() {
        document.getElementById('scale-lbl').textContent = boardTextScaleLabel(+this.value || 1);
        if (selected>=0&&elements[selected].type==='text'){ elements[selected].scale=+this.value; render(); }
    };
    document.getElementById('txt-scale').onchange = function() {
        if (selected>=0&&elements[selected].type==='text') snapshot();
    };
    document.getElementById('txt-content').oninput = function() {
        if (selected>=0&&elements[selected].type==='text'){ elements[selected].text=this.value; render(); updateLayerList(); }
    };
    document.getElementById('txt-content').onblur = function() {
        if (selected>=0&&elements[selected].type==='text') snapshot();
    };
    ['txt-font-family','txt-font-weight','txt-custom-font'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.oninput = el.onchange = function() {
            if (selected>=0 && elements[selected].type==='text') {
                const t = elements[selected];
                t.fontFamily = document.getElementById('txt-font-family').value;
                t.weight = document.getElementById('txt-font-weight').value;
                t.customFont = document.getElementById('txt-custom-font').value.trim();
                render(); updateLayerList();
            }
        };
        el.onblur = function() {
            if (selected>=0 && elements[selected].type==='text') snapshot();
        };
    });

    // 形状
    document.getElementById('shape-fill').onchange = function() {
        if (selected>=0&&['rect','ellipse'].includes(elements[selected].type)){
            elements[selected].fill=this.checked; render(); snapshot();
        }
    };
    const syncShape = (key, id) => {
        document.getElementById(id).oninput = function() {
            if (selected<0) return;
            const el=elements[selected], v=+this.value||1;
            if (key==='w') { if(el.type==='rect')el.w=v; else if(el.type==='ellipse')el.rx=v; }
            if (key==='h') { if(el.type==='rect')el.h=v; else if(el.type==='ellipse')el.ry=v; }
            render();
        };
        document.getElementById(id).onchange = () => { if(selected>=0) snapshot(); };
    };
    syncShape('w','shape-w'); syncShape('h','shape-h');
    document.getElementById('shape-radius').oninput = function() {
        document.getElementById('radius-lbl').textContent = this.value+'px';
        if (selected>=0 && elements[selected].type==='rect') {
            elements[selected].radius = +this.value; render();
        }
    };
    document.getElementById('shape-radius').onchange = () => { if(selected>=0) snapshot(); };
    document.getElementById('sw-shape').oninput = function() {
        document.getElementById('sw-shape-lbl').textContent = this.value+'px';
        if (selected>=0&&['rect','ellipse'].includes(elements[selected].type)){
            elements[selected].sw=+this.value; render();
        }
    };
    document.getElementById('sw-shape').onchange = () => { if(selected>=0) snapshot(); };

    // 直线
    document.getElementById('sw-line').oninput = function() {
        document.getElementById('sw-line-lbl').textContent = this.value+'px';
        if (selected>=0&&elements[selected].type==='line'){ elements[selected].sw=+this.value; render(); }
    };
    document.getElementById('sw-line').onchange = () => { if(selected>=0) snapshot(); };

    // 铅笔
    document.getElementById('sw-pencil').oninput = function() {
        document.getElementById('sw-pencil-lbl').textContent = this.value+'px';
    };

    // 图标
    document.getElementById('icon-scale').oninput = function() {
        document.getElementById('icon-scale-lbl').textContent = this.value+'×';
        if (selected>=0&&elements[selected].type==='icon'){ elements[selected].scale=+this.value; render(); }
    };
    document.getElementById('icon-scale').onchange = () => { if(selected>=0) snapshot(); };

    // 图片转换参数
    const bindImgRange = (id, lbl, fmt) => {
        const el = document.getElementById(id);
        if (!el) return;
        const sync = () => { document.getElementById(lbl).textContent = fmt(+el.value); };
        el.oninput = () => { sync(); scheduleActiveImagePreview(); };
        sync();
    };
    loadImageConvertOptions();
    bindImgRange('img-threshold', 'img-threshold-lbl', v => String(v));
    bindImgRange('img-contrast', 'img-contrast-lbl', v => (v / 100).toFixed(2) + '×');
    bindImgRange('img-red', 'img-red-lbl', v => (v / 100).toFixed(2));
    bindImgRange('img-dither', 'img-dither-lbl', v => (v / 100).toFixed(2) + '×');
    const imgInvert = document.getElementById('img-invert');
    if (imgInvert) imgInvert.onchange = () => scheduleActiveImagePreview();
    const imgFit = document.getElementById('img-fit');
    if (imgFit) imgFit.onchange = () => scheduleActiveImagePreview();

    // 画布事件——mousedown 在 canvas，move/up 在 document（防止拖出丢失）
    canvas.addEventListener('mousedown',  onDown);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    canvas.addEventListener('mouseleave', () => { if (!mouseDown) octx.clearRect(0,0,overlay.width,overlay.height); });

    // 触摸
    canvas.addEventListener('touchstart', e=>{e.preventDefault(); onDown(touch2mouse(e));}, {passive:false});
    canvas.addEventListener('touchmove',  e=>{e.preventDefault(); onMove(touch2mouse(e));}, {passive:false});
    canvas.addEventListener('touchend',   e=>{ onUp(touch2mouse(e)); });

    // 键盘
    document.addEventListener('keydown', e => {
        const tag = document.activeElement.tagName;
        if (tag==='INPUT'||tag==='TEXTAREA') return;
        if (e.key==='Delete'||e.key==='Backspace') deleteSelected();
        if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
        if ((e.ctrlKey||e.metaKey) && e.key==='y') { e.preventDefault(); redo(); }
        if ((e.ctrlKey||e.metaKey) && e.key==='d') { e.preventDefault(); duplicateSelected(); }
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && selected>=0 && selected<elements.length) {
            e.preventDefault();
            const step = e.shiftKey ? 10 : 1;
            const el = elements[selected];
            const dx = e.key==='ArrowLeft'?-step:e.key==='ArrowRight'?step:0;
            const dy = e.key==='ArrowUp'?-step:e.key==='ArrowDown'?step:0;
            if (el.type==='line'){el.x1+=dx;el.y1+=dy;el.x2+=dx;el.y2+=dy;}
            else if(el.type==='path'){el.pts=el.pts.map(p=>[p[0]+dx,p[1]+dy]);}
            else {el.x+=dx; el.y+=dy;}
            render(); updateProps(); snapshot();
        }
        if (!e.ctrlKey && !e.metaKey) {
            if (e.key==='v'||e.key==='V') switchTool('select');
            if (e.key==='p'||e.key==='P') switchTool('pencil');
            if (e.key==='t'||e.key==='T') switchTool('text');
            if (e.key==='r'||e.key==='R') switchTool('rect');
            if (e.key==='e'||e.key==='E') switchTool('ellipse');
            if (e.key==='l'||e.key==='L') switchTool('line');
            if (e.key==='i'||e.key==='I') switchTool('icon');
            if (e.key==='g'||e.key==='G') switchTool('image');
        }
    });
}

function switchTool(t) {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b=>{
        b.classList.toggle('active', b.dataset.tool===t);
    });
    updatePanels();
    canvas.style.cursor = (t==='select')?'default':(t==='pencil'?'crosshair':'crosshair');
}

function touch2mouse(e) {
    const t = e.touches[0]||e.changedTouches[0];
    return {clientX:t.clientX, clientY:t.clientY, buttons:1};
}

function canvasXY(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / r.width;
    const scaleY = canvas.height / r.height;
    const px = (e.clientX - r.left) * scaleX;
    const py = (e.clientY - r.top)  * scaleY;
    return {
        x: snapG(Math.round(px / SCALE)),
        y: snapG(Math.round(py / SCALE)),
        sx: px,
        sy: py,
    };
}

function onDown(e) {
    // 只响应点在 canvas 上的 mousedown
    if (e.target !== canvas) return;
    e.preventDefault();
    mouseDown = true;
    const {x, y, sx, sy} = canvasXY(e);

    if (tool === 'select') {
        if (selected >= 0 && !elements[selected]?.locked) {
            const hid = hitHandle(elements[selected], sx, sy);
            if (hid) {
                dragMode = 'resize-' + hid;
                dragStart = { mx:x, my:y, snap: JSON.parse(JSON.stringify(elements[selected])) };
                return;
            }
        }
        const hit = hitTest(x, y);
        if (hit >= 0) {
            selected = hit;
            dragMode = 'move';
            dragStart = { mx:x, my:y, snap: JSON.parse(JSON.stringify(elements[hit])) };
        } else {
            selected = -1;
            dragMode = null;
            dragStart = null;
        }
        render(); updateLayerList(); updateProps();
        return;
    }

    if (tool === 'pencil') {
        pencilPts = [[x, y]];
        return;
    }

    drawStart = {x, y};
}

function onMove(e) {
    // 悬停状态（未按下鼠标）：只在 canvas 上方才更新光标
    if (!mouseDown) {
        if (e.target === canvas && tool==='select' && selected>=0) {
            const {sx,sy} = canvasXY(e);
            const hid = hitHandle(elements[selected], sx, sy);
            canvas.style.cursor = hid ? 'nwse-resize' : 'default';
        }
        return;
    }

    // 按下状态：统一用 canvasXY 计算（允许超出边界）
    const {x, y} = canvasXY(e);

    /* 铅笔 */
    if (tool === 'pencil' && pencilPts) {
        const last = pencilPts[pencilPts.length-1];
        if (Math.abs(x-last[0])>=1 || Math.abs(y-last[1])>=1) {
            pencilPts.push([x, y]);
        }
        octx.clearRect(0,0,overlay.width,overlay.height);
        if (pencilPts.length >= 2) {
            const sw = +document.getElementById('sw-pencil').value||2;
            const [r,g,b] = FG_COLORS[color];
            octx.strokeStyle = `rgb(${r},${g},${b})`;
            octx.lineWidth = sw * SCALE;
            octx.lineCap = 'round'; octx.lineJoin='round';
            octx.beginPath();
            octx.moveTo(pencilPts[0][0]*SCALE, pencilPts[0][1]*SCALE);
            for (let k=1;k<pencilPts.length;k++) octx.lineTo(pencilPts[k][0]*SCALE, pencilPts[k][1]*SCALE);
            octx.stroke();
        }
        return;
    }

    /* 选择模式：移动或缩放 */
    if (tool === 'select' && dragStart && selected>=0) {
        const dx = x - dragStart.mx, dy = y - dragStart.my;
        const el = elements[selected];
        const snap = dragStart.snap;
        if (dragMode === 'move') {
            if (el.type==='line') {
                el.x1=snapG(snap.x1+dx); el.y1=snapG(snap.y1+dy);
                el.x2=snapG(snap.x2+dx); el.y2=snapG(snap.y2+dy);
            } else if (el.type==='path') {
                el.pts = snap.pts.map(p=>[p[0]+dx, p[1]+dy]);
            } else {
                el.x=snapG(snap.x+dx); el.y=snapG(snap.y+dy);
            }
        } else if (dragMode && dragMode.startsWith('resize-')) {
            applyResize(el, snap, dragMode.slice(7), dx, dy);
        }
        render(); updateProps();
        return;
    }

    /* 绘制预览（在 canvas 范围内才显示） */
    if (drawStart && e.target === canvas) {
        octx.clearRect(0,0,overlay.width,overlay.height);
        drawPreview(drawStart, {x, y});
    }
}

function applyResize(el, snap, hid, dx, dy) {
    if (el.type==='rect') {
        let {x,y,w,h}=snap;
        if (hid.includes('l')) { x=snap.x+dx; w=Math.max(2,snap.w-dx); }
        if (hid.includes('r')) { w=Math.max(2,snap.w+dx); }
        if (hid.includes('t')) { y=snap.y+dy; h=Math.max(2,snap.h-dy); }
        if (hid.includes('b')) { h=Math.max(2,snap.h+dy); }
        if (hid==='tm'||hid==='bm') { x=snap.x; w=snap.w; }
        if (hid==='ml'||hid==='mr') { y=snap.y; h=snap.h; }
        el.x=x; el.y=y; el.w=w; el.h=h;
    } else if (el.type==='ellipse') {
        if (hid==='rx+') el.rx=Math.max(2,snap.rx+dx);
        if (hid==='rx-') el.rx=Math.max(2,snap.rx-dx);
        if (hid==='ry+') el.ry=Math.max(2,snap.ry+dy);
        if (hid==='ry-') el.ry=Math.max(2,snap.ry-dy);
    } else if (el.type==='line') {
        if (hid==='p1') { el.x1=snap.x1+dx; el.y1=snap.y1+dy; }
        if (hid==='p2') { el.x2=snap.x2+dx; el.y2=snap.y2+dy; }
    } else if (el.type==='image') {
        const imgData = CANVAS_IMAGES[el.name];
        const oldDw = snap.dw || (imgData ? imgData.w : 32);
        const oldDh = snap.dh || (imgData ? imgData.h : 32);
        const ratio = oldDw / oldDh;
        let newDw = oldDw;
        if (hid === 'br' || hid === 'tr') newDw = oldDw + dx;
        else if (hid === 'bl' || hid === 'tl') newDw = oldDw - dx;
        newDw = Math.max(8, Math.round(newDw));
        const newDh = Math.max(8, Math.round(newDw / ratio));
        if (hid === 'bl' || hid === 'tl') el.x = snap.x + oldDw - newDw;
        if (hid === 'tr' || hid === 'tl') el.y = snap.y + oldDh - newDh;
        el.dw = newDw;
        el.dh = newDh;
    }
}

function onUp(e) {
    if (!mouseDown) return;
    mouseDown = false;

    /* 铅笔结束：先 RDP 化简，再整数化坐标，避免一笔几 KB */
    if (tool === 'pencil' && pencilPts && pencilPts.length >= 2) {
        octx.clearRect(0,0,overlay.width,overlay.height);
        const sw = +document.getElementById('sw-pencil').value||2;
        const before = pencilPts.length;
        let pts = simplifyPath(pencilPts, 1.5);
        pts = pts.map(p => [Math.round(p[0]), Math.round(p[1])]);
        if (before > 50 && pts.length < before) {
            console.debug(`[pencil] simplified ${before} → ${pts.length} points`);
        }
        elements.push({type:'path', pts, color, sw});
        selected = elements.length-1;
        pencilPts = null;
        render(); updateLayerList(); updateProps(); snapshot();
        return;
    }
    pencilPts = null;

    /* 选择 / 拖拽结束 */
    if (tool === 'select') {
        if (dragMode && dragStart) {
            snapshot(); // 有拖拽动作就存快照
        }
        dragMode = null;
        dragStart = null;
        render();
        return;
    }

    /* 绘制提交 */
    if (!drawStart) return;
    octx.clearRect(0,0,overlay.width,overlay.height);
    // onUp 在 document 上，e 可能没有画布坐标（如 touchend），需要安全取坐标
    let ex = drawStart.x, ey = drawStart.y;
    if (e && e.clientX != null) {
        const pos = canvasXY(e);
        ex = pos.x; ey = pos.y;
    }
    commitDraw(drawStart, {x:ex, y:ey});
    drawStart = null;
}

function drawPreview(s, e) {
    octx.save();
    octx.strokeStyle='rgba(41,128,185,.85)';
    octx.fillStyle='rgba(41,128,185,.1)';
    octx.lineWidth=1.5; octx.setLineDash([5,4]);
    const sc=SCALE;
    switch(tool){
        case 'rect':
            octx.strokeRect(s.x*sc, s.y*sc, (e.x-s.x)*sc, (e.y-s.y)*sc);
            octx.fillRect(s.x*sc, s.y*sc, (e.x-s.x)*sc, (e.y-s.y)*sc);
            break;
        case 'ellipse':{
            const cx=(s.x+e.x)/2*sc, cy=(s.y+e.y)/2*sc;
            const rx=Math.abs(e.x-s.x)/2*sc, ry=Math.abs(e.y-s.y)/2*sc;
            octx.beginPath(); octx.ellipse(cx,cy,rx||1,ry||1,0,0,Math.PI*2);
            octx.stroke(); octx.fill(); break;
        }
        case 'line':
            octx.beginPath(); octx.moveTo(s.x*sc,s.y*sc); octx.lineTo(e.x*sc,e.y*sc); octx.stroke(); break;
        case 'text': case 'icon':
            octx.setLineDash([]); octx.lineWidth=1;
            octx.strokeRect(s.x*sc-5, s.y*sc-5, 10, 10); break;
    }
    octx.restore();
}

function commitDraw(s, e) {
    if (!s) return;
    let el = null;
    const sw = tool==='line' ? +document.getElementById('sw-line').value||1
                             : +document.getElementById('sw-shape').value||1;
    switch(tool) {
        case 'text': {
            const text  = document.getElementById('txt-content').value||'文本';
            const scale = +document.getElementById('txt-scale').value||1;
            el = {
                type:'text', x:s.x, y:s.y, color, scale, text,
                fontFamily: document.getElementById('txt-font-family').value,
                weight: document.getElementById('txt-font-weight').value,
                customFont: document.getElementById('txt-custom-font').value.trim()
            };
            break;
        }
        case 'rect': {
            const x=Math.min(s.x,e.x), y=Math.min(s.y,e.y);
            const w=Math.max(2,Math.abs(e.x-s.x)), h=Math.max(2,Math.abs(e.y-s.y));
            const rad = +document.getElementById('shape-radius').value||0;
            el = {type:'rect', x, y, w, h, color, fill:document.getElementById('shape-fill').checked, sw, radius:rad};
            break;
        }
        case 'ellipse': {
            const cx=Math.round((s.x+e.x)/2), cy=Math.round((s.y+e.y)/2);
            const rx=Math.max(2,Math.round(Math.abs(e.x-s.x)/2));
            const ry=Math.max(2,Math.round(Math.abs(e.y-s.y)/2));
            el = {type:'ellipse', x:cx, y:cy, rx, ry, color, fill:document.getElementById('shape-fill').checked, sw};
            break;
        }
        case 'line':
            el = {type:'line', x1:s.x, y1:s.y, x2:e.x, y2:e.y, color, sw};
            break;
        case 'icon':
            if (!selectedIconName) { toast('请先在右侧选择一个图标'); return; }
            el = {type:'icon', x:s.x, y:s.y, name:selectedIconName, scale:+document.getElementById('icon-scale').value||1, color};
            break;
        case 'image':
            if (!selectedImageName) { toast('请先上传并选择一张图片'); return; }
            const imgData = CANVAS_IMAGES[selectedImageName];
            el = {type:'image', x:s.x, y:s.y, name:selectedImageName,
                  dw: imgData ? imgData.w : 32,
                  dh: imgData ? imgData.h : 32, color};
            break;
    }
    if (!el) return;
    elements.push(el);
    selected = elements.length-1;
    render(); updateLayerList(); updateProps(); snapshot();
}

/* ═══════════════════════════════════════════════
   图层列表
═══════════════════════════════════════════════ */
function updateLayerList() {
    const list = document.getElementById('layer-list');
    list.innerHTML = '';
    document.getElementById('layer-count').textContent = elements.length ? `(${elements.length})` : '';
    [...elements].reverse().forEach((el, ri) => {
        const i = elements.length-1-ri;
        const div = document.createElement('div');
        div.className = 'layer-item'+(i===selected?' sel':'')+(el.hidden?' hidden-layer':'')+(el.locked?' locked-layer':'');
        div.onclick = () => { if (!el.locked) { selected=i; render(); updateLayerList(); updateProps(); } };

        const t = document.createElement('span'); t.className='ltype';
        t.textContent = {text:'字',rect:'矩',ellipse:'圆',line:'线',path:'笔',icon:'图',image:'图片'}[el.type]||'?';
        div.appendChild(t);

        const nm = document.createElement('span'); nm.className='lname';
        nm.textContent = el.label||el.text||el.name
            ||(el.type==='line'?`(${el.x1},${el.y1})→(${el.x2},${el.y2})`:null)
            ||(el.type==='path'?`笔迹(${(el.pts||[]).length}点)`:null)
            ||`x${el.x||0} y${el.y||0}`;
        div.appendChild(nm);

        const up=document.createElement('span'); up.className='lbtn'; up.title='上移'; up.textContent='↑';
        up.onclick=ev=>{ev.stopPropagation();if(i<elements.length-1){[elements[i],elements[i+1]]=[elements[i+1],elements[i]];if(selected===i)selected=i+1;else if(selected===i+1)selected=i;render();updateLayerList();snapshot();}};
        const dn=document.createElement('span'); dn.className='lbtn'; dn.title='下移'; dn.textContent='↓';
        dn.onclick=ev=>{ev.stopPropagation();if(i>0){[elements[i],elements[i-1]]=[elements[i-1],elements[i]];if(selected===i)selected=i-1;else if(selected===i-1)selected=i;render();updateLayerList();snapshot();}};
        const top=document.createElement('span'); top.className='lbtn'; top.title='置顶'; top.textContent='⇡';
        top.onclick=ev=>{ev.stopPropagation();if(i<elements.length-1){const [e]=elements.splice(i,1);elements.push(e);selected=elements.length-1;render();updateLayerList();snapshot();}};
        const bot=document.createElement('span'); bot.className='lbtn'; bot.title='置底'; bot.textContent='⇣';
        bot.onclick=ev=>{ev.stopPropagation();if(i>0){const [e]=elements.splice(i,1);elements.unshift(e);selected=0;render();updateLayerList();snapshot();}};
        const cp=document.createElement('span'); cp.className='lbtn'; cp.title='复制'; cp.textContent='⧉';
        cp.onclick=ev=>{ev.stopPropagation();selected=i;duplicateSelected();};
        const rn=document.createElement('span'); rn.className='lbtn'; rn.title='重命名'; rn.textContent='✎';
        rn.onclick=ev=>{ev.stopPropagation();const v=prompt('图层名称：', el.label||nm.textContent||'');if(v!=null){el.label=v.trim().slice(0,24);render();updateLayerList();snapshot();}};

        const ey=document.createElement('span'); ey.className='lbtn'; ey.title=el.hidden?'显示':'隐藏';
        ey.textContent=el.hidden?'🚫':'👁'; ey.style.opacity=el.hidden?'0.4':'1';
        ey.onclick=ev=>{ev.stopPropagation();el.hidden=!el.hidden;render();updateLayerList();snapshot();};

        const lk=document.createElement('span'); lk.className='lbtn'; lk.title=el.locked?'解锁':'锁定';
        lk.textContent=el.locked?'🔒':'🔓'; lk.style.opacity=el.locked?'1':'0.4';
        lk.onclick=ev=>{ev.stopPropagation();el.locked=!el.locked;if(el.locked&&selected===i){selected=-1;}render();updateLayerList();snapshot();};

        const dl=document.createElement('span'); dl.className='lbtn del'; dl.title='删除'; dl.textContent='×';
        dl.onclick=ev=>{ev.stopPropagation();elements.splice(i,1);if(selected>=elements.length)selected=elements.length-1;render();updateLayerList();snapshot();};

        div.appendChild(up); div.appendChild(dn); div.appendChild(top); div.appendChild(bot);
        div.appendChild(cp); div.appendChild(rn); div.appendChild(ey); div.appendChild(lk); div.appendChild(dl);
        list.appendChild(div);
    });
}

/* ═══════════════════════════════════════════════
   属性面板
═══════════════════════════════════════════════ */
function updatePanels() {
    document.getElementById('panel-pencil').style.display = tool==='pencil'  ?'':'none';
    document.getElementById('panel-text').style.display   = tool==='text'    ?'':'none';
    document.getElementById('panel-shape').style.display  = ['rect','ellipse'].includes(tool)?'':'none';
    document.getElementById('panel-line').style.display   = tool==='line'    ?'':'none';
    document.getElementById('panel-icon').style.display   = tool==='icon'    ?'':'none';
    document.getElementById('panel-image').style.display  = tool==='image'   ?'':'none';
}

function updateProps() {
    if (selected<0||selected>=elements.length) return;
    const el = elements[selected];

    // 颜色
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('sel'));
    const cb=document.querySelector(`.color-btn[data-color="${el.color}"]`);
    if (cb) cb.classList.add('sel');
    color = el.color;

    // 位置
    const b = getBounds(el);
    document.getElementById('pos-x').value = Math.round(b.x);
    document.getElementById('pos-y').value = Math.round(b.y);

    // 切换到对应面板（但不改变当前工具，只更新面板显示）
    const panelType = el.type==='path'?'pencil':el.type;
    document.getElementById('panel-pencil').style.display = panelType==='pencil'  ?'':'none';
    document.getElementById('panel-text').style.display   = panelType==='text'    ?'':'none';
    document.getElementById('panel-shape').style.display  = ['rect','ellipse'].includes(panelType)?'':'none';
    document.getElementById('panel-line').style.display   = panelType==='line'    ?'':'none';
    document.getElementById('panel-icon').style.display   = panelType==='icon'    ?'':'none';
    document.getElementById('panel-image').style.display  = panelType==='image'   ?'':'none';

    if (el.type==='text') {
        document.getElementById('txt-content').value = el.text||'';
        document.getElementById('txt-scale').value   = el.scale||1;
        document.getElementById('scale-lbl').textContent = boardTextScaleLabel(el.scale || 1);
        document.getElementById('txt-font-family').value = el.fontFamily || 'LXGW 975 Yuan SC, 霞鹜975圆体 SC, Microsoft YaHei UI, Microsoft YaHei, sans-serif';
        document.getElementById('txt-font-weight').value = el.weight || '600';
        document.getElementById('txt-custom-font').value = el.customFont || '';
    }
    if (el.type==='rect') {
        document.getElementById('shape-fill').checked = !!el.fill;
        document.getElementById('shape-w').value = el.w;
        document.getElementById('shape-h').value = el.h;
        document.getElementById('sw-shape').value = el.sw||1;
        document.getElementById('sw-shape-lbl').textContent = (el.sw||1)+'px';
        const rad = el.radius||0;
        document.getElementById('shape-radius').value = rad;
        document.getElementById('radius-lbl').textContent = rad+'px';
        document.getElementById('rect-radius-row').style.display = '';
    }
    if (el.type==='ellipse') {
        document.getElementById('shape-fill').checked = !!el.fill;
        document.getElementById('shape-w').value = el.rx||10;
        document.getElementById('shape-h').value = el.ry||10;
        document.getElementById('sw-shape').value = el.sw||1;
        document.getElementById('sw-shape-lbl').textContent = (el.sw||1)+'px';
        document.getElementById('rect-radius-row').style.display = 'none';
    }
    if (el.type==='line') {
        document.getElementById('sw-line').value = el.sw||1;
        document.getElementById('sw-line-lbl').textContent = (el.sw||1)+'px';
        document.getElementById('line-x1').value = el.x1;
        document.getElementById('line-y1').value = el.y1;
        document.getElementById('line-x2').value = el.x2;
        document.getElementById('line-y2').value = el.y2;
    }
    if (el.type==='path') {
        document.getElementById('sw-pencil').value = el.sw||2;
        document.getElementById('sw-pencil-lbl').textContent = (el.sw||2)+'px';
    }
    if (el.type==='icon') {
        document.getElementById('icon-scale').value = el.scale||1;
        document.getElementById('icon-scale-lbl').textContent = (el.scale||1)+'×';
        document.querySelectorAll('.icon-item').forEach(d=>{
            d.classList.toggle('sel', d.dataset.name===el.name);
        });
        selectedIconName = el.name;
    }
    if (el.type==='image') {
        const dw = el.dw || 32, dh = el.dh || 32;
        document.getElementById('img-size-info').textContent = `当前尺寸：${dw}×${dh} px（拖角点调整）`;
        document.querySelectorAll('#image-list-grid .icon-item').forEach(d=>{
            d.classList.toggle('sel', d.dataset.name===el.name);
        });
        selectedImageName = el.name;
    }
}

function applyPosition() {
    if (selected<0) return;
    const el=elements[selected];
    const nx=+document.getElementById('pos-x').value||0;
    const ny=+document.getElementById('pos-y').value||0;
    const b=getBounds(el);
    const dx=nx-b.x, dy=ny-b.y;
    if (el.type==='line'){el.x1+=dx;el.y1+=dy;el.x2+=dx;el.y2+=dy;}
    else if(el.type==='path'){el.pts=el.pts.map(p=>[p[0]+dx,p[1]+dy]);}
    else {el.x+=dx; el.y+=dy;}
    render(); updateLayerList(); snapshot();
}

function applyLineCoords() {
    if (selected<0||elements[selected].type!=='line') return;
    const el=elements[selected];
    el.x1=+document.getElementById('line-x1').value||0;
    el.y1=+document.getElementById('line-y1').value||0;
    el.x2=+document.getElementById('line-x2').value||0;
    el.y2=+document.getElementById('line-y2').value||0;
    render(); updateLayerList(); snapshot();
}

/* ═══════════════════════════════════════════════
   编辑
═══════════════════════════════════════════════ */
function deleteSelected() {
    if (selected<0||selected>=elements.length) return;
    elements.splice(selected,1);
    selected = Math.min(selected, elements.length-1);
    render(); updateLayerList(); snapshot();
}

function duplicateSelected() {
    if (selected<0||selected>=elements.length) return;
    const copy = JSON.parse(JSON.stringify(elements[selected]));
    // 偏移 10 像素
    if (copy.type==='line'){copy.x1+=10;copy.y1+=10;copy.x2+=10;copy.y2+=10;}
    else if(copy.type==='path'){copy.pts=copy.pts.map(p=>[p[0]+10,p[1]+10]);}
    else {copy.x+=10; copy.y+=10;}
    elements.push(copy);
    selected=elements.length-1;
    render(); updateLayerList(); updateProps(); snapshot();
    toast('已复制');
}

function clearAll() {
    if (!confirm('清空所有元素？')) return;
    elements=[]; selected=-1; render(); updateLayerList(); snapshot();
}

/* ═══════════════════════════════════════════════
   布局持久化
═══════════════════════════════════════════════ */
async function saveLayout() {
    const res = await persistLayout();
    if (res.ok) toast(res.skipped ? '布局无变化' : '💾 布局已保存');
    else toast('保存失败: ' + (res.msg || res.status || '网络错误'));
}

async function loadLayout() {
    try {
        const r = await fetch('/canvas_layout', epdFetchOpts());
        if (!r.ok) return;
        const data = await r.json();
        if (Array.isArray(data)){
            elements=data; selected=-1;
            await ensureImagesForLayout();
            render(); updateLayerList(); setSaveStatus('✓ 已保存');
            markSavedJson();
            snapshot(true); // 建初始撤销快照，不触发自动保存
        }
    } catch(e){}
}

async function showOnEPD() {
    if (!_sendConfirmed) {
        openSendPreview();
        return;
    }
    _sendConfirmed = false;
    const btn = document.getElementById('btn-show-epd');
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;
    toast('正在保存并发送…');
    try {
        const r1 = await persistLayout();
        if (!r1.ok){
            toast('保存失败: ' + (r1.msg || r1.status || '网络错误'));
            return;
        }
        const blob = await boardSnapshotBlob();
        const r2 = await fetch('/msg_image_show', epdFetchOpts({
            method:'POST',
            headers:{'Content-Type':'image/png'},
            body:blob
        }));
        if (r2.ok) toast('✅ 网页字体快照已发送到墨水屏！');
        else toast('发送失败: '+r2.status);
    } catch(e){ toast('发送失败'); }
    finally { if (btn) btn.disabled = false; }
}

function openSendPreview() {
    const pc = document.getElementById('send-preview-canvas');
    const snap = renderBoardSnapshotCanvas();
    pc.width = snap.width;
    pc.height = snap.height;
    const px = pc.getContext('2d');
    px.clearRect(0,0,pc.width,pc.height);
    px.drawImage(snap, 0, 0);
    const meta = document.getElementById('send-preview-meta');
    meta.textContent = `当前面板 ${EPD_W}×${EPD_H} / 网页字体快照 / 元素 ${elements.length} 个`;
    document.getElementById('send-preview-overlay').style.display = 'flex';
}

function closeSendPreview() {
    document.getElementById('send-preview-overlay').style.display = 'none';
}

function confirmSendOnEPD() {
    closeSendPreview();
    _sendConfirmed = true;
    showOnEPD();
}

/* ═══════════════════════════════════════════════
   Toast
═══════════════════════════════════════════════ */
let _tt;
function toast(msg) {
    const el=document.getElementById('toast');
    el.textContent=msg; el.style.display='block';
    clearTimeout(_tt); _tt=setTimeout(()=>el.style.display='none', 2600);
}

init();
</script>
