<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画布留言板</title>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('epd_theme')||'loopy')})()</script>
<style>
/* ── Theme: Loopy ── */
[data-theme="loopy"]{
  --bg:#FFF0F5;--g1:rgba(255,182,203,.32);--g2:rgba(173,216,250,.28);
  --cd:#fff;--cb:rgba(255,155,179,.22);--ch:rgba(255,155,179,.10);--cs:0 6px 28px rgba(255,155,179,.13);
  --sf:rgba(255,236,245,.75);--sb:rgba(255,155,179,.20);
  --tx:#5A3050;--t2:rgba(120,70,100,.62);
  --ac:#FF9BB3;--a2:#8CC8F0;--ag:rgba(255,155,179,.28);
  --bt:#fff;--ok:#2E9E52;--er:#E53935;--hv:rgba(255,155,179,.10);--tg:rgba(255,155,179,.22)
}
/* ── Theme: Hello Kitty ── */
[data-theme="kitty"]{
  --bg:#FFF8F8;--g1:rgba(255,77,109,.18);--g2:rgba(255,215,0,.14);
  --cd:#fff;--cb:rgba(255,77,109,.17);--ch:rgba(255,77,109,.07);--cs:0 6px 28px rgba(255,77,109,.10);
  --sf:rgba(255,245,247,.8);--sb:rgba(255,77,109,.14);
  --tx:#4A1525;--t2:rgba(130,50,70,.58);
  --ac:#FF4D6D;--a2:#FFB347;--ag:rgba(255,77,109,.24);
  --bt:#fff;--ok:#2E9E52;--er:#D32F2F;--hv:rgba(255,77,109,.07);--tg:rgba(255,77,109,.15)
}
/* ── Theme: 草莓熊 ── */
[data-theme="lotso"]{
  --bg:#FBF0F3;--g1:rgba(183,70,120,.20);--g2:rgba(232,160,184,.18);
  --cd:#fff;--cb:rgba(183,70,120,.17);--ch:rgba(183,70,120,.07);--cs:0 6px 28px rgba(183,70,120,.10);
  --sf:rgba(251,238,244,.8);--sb:rgba(183,70,120,.14);
  --tx:#4A1428;--t2:rgba(120,40,70,.58);
  --ac:#B74678;--a2:#E8A0B8;--ag:rgba(183,70,120,.24);
  --bt:#fff;--ok:#2E9E52;--er:#C62828;--hv:rgba(183,70,120,.07);--tg:rgba(183,70,120,.15)
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color .3s,border-color .3s,color .3s}
body{font-family:'Segoe UI',system-ui,sans-serif;
  background:radial-gradient(1200px 800px at 20% -10%,var(--g1),transparent 60%),
             radial-gradient(900px 600px at 100% 0%,var(--g2),transparent 55%),var(--bg);
  color:var(--tx);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 顶部栏 */
#topbar{background:var(--cd);border-bottom:1px solid var(--cb);padding:5px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;box-shadow:var(--cs)}
#topbar h1{font-size:.9rem;font-weight:800;color:var(--ac);margin-right:6px;white-space:nowrap}
#topbar a.back{font-size:.78rem;color:var(--t2);text-decoration:none;font-weight:600;padding:3px 7px;border-radius:6px;border:1px solid var(--cb);background:var(--sf);white-space:nowrap}
#topbar a.back:hover{color:var(--ac);border-color:var(--ac)}
.tb-btn{background:var(--sf);border:1px solid var(--cb);border-radius:8px;color:var(--tx);cursor:pointer;font-size:.78rem;padding:4px 10px;transition:.15s;white-space:nowrap;font-weight:600}
.tb-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--hv)}
.tb-btn:disabled{opacity:.35;cursor:default}
.tb-btn.primary{background:linear-gradient(135deg,var(--ac),var(--a2));border-color:transparent;color:var(--bt);box-shadow:0 3px 12px var(--ag)}
.tb-btn.primary:hover{filter:brightness(1.07);border-color:transparent;color:var(--bt)}
.tb-sep{width:1px;height:20px;background:var(--cb);margin:0 2px}
#app{display:flex;flex:1;overflow:hidden}

/* 工具栏 */
#toolbar{background:var(--cd);border-right:1px solid var(--cb);padding:8px 5px;display:flex;flex-direction:column;gap:4px;width:54px;min-width:54px;overflow-y:auto}
.tool-btn{background:var(--sf);border:2px solid transparent;border-radius:8px;color:var(--t2);cursor:pointer;font-size:17px;padding:6px 4px;text-align:center;transition:.15s;user-select:none;line-height:1.2}
.tool-btn:hover{background:var(--hv);color:var(--tx);border-color:var(--cb)}
.tool-btn.active{border-color:var(--ac);color:var(--ac);background:var(--hv);box-shadow:0 2px 8px var(--ag)}
.tool-sep{height:1px;background:var(--cb);margin:4px 2px}
.tool-btn .tlbl{font-size:.44rem;display:block;color:var(--t2);margin-top:2px;letter-spacing:.02em}
.tool-btn.active .tlbl{color:var(--ac)}

/* 画布区 */
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:16px;
  background:repeating-conic-gradient(var(--sf) 0% 25%,var(--bg) 0% 50%) 0 0/24px 24px}
#canvas-outer{position:relative;display:inline-block;border-radius:4px;overflow:hidden;
  box-shadow:0 0 0 1px var(--cb),0 8px 32px rgba(0,0,0,.15)}
#canvas{display:block;background:#fff;image-rendering:pixelated}
#overlay{position:absolute;top:0;left:0;pointer-events:none;image-rendering:pixelated}

/* 右侧面板 */
#sidebar{background:var(--cd);border-left:1px solid var(--cb);width:252px;min-width:252px;overflow-y:auto;display:flex;flex-direction:column}
.panel{padding:10px 12px;border-bottom:1px solid var(--cb)}
.panel h3{font-size:.68rem;text-transform:uppercase;color:var(--t2);margin-bottom:8px;letter-spacing:.08em;font-weight:700;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;gap:6px}
.panel h3::after{content:'▾';font-size:.72rem;color:var(--t2);opacity:.75}
.panel.collapsed h3{margin-bottom:0}
.panel.collapsed h3::after{content:'▸'}
.panel.collapsed>:not(h3){display:none!important}
label{display:block;font-size:.78rem;margin-bottom:3px;color:var(--t2)}
input[type=number],input[type=text],select,textarea{
  width:100%;background:var(--sf);border:1px solid var(--sb);color:var(--tx);
  padding:5px 8px;border-radius:8px;font-size:.82rem;margin-bottom:6px;font-family:inherit}
input[type=number]:focus,input[type=text]:focus,select:focus,textarea:focus{
  outline:none;border-color:var(--ac);box-shadow:0 0 0 3px var(--ag)}
input[type=range]{width:100%;margin-bottom:4px;accent-color:var(--ac)}
input[type=checkbox]{accent-color:var(--ac);margin-right:4px}
.row2{display:flex;gap:6px}
.row2>div{flex:1}
.hint{font-size:.66rem;color:var(--t2);opacity:.7;margin-bottom:4px}

/* 颜色 */
.color-row{display:flex;gap:5px;margin-bottom:8px}
.color-btn{flex:1;padding:5px 2px;border:2px solid var(--cb);border-radius:8px;cursor:pointer;font-size:.72rem;text-align:center;font-weight:700;transition:.15s}
.color-btn.black{background:#222;color:#fff}
.color-btn.red{background:#c0392b;color:#fff}
.color-btn.white{background:#fff;color:#555}
.color-btn.sel{border-color:var(--ac);transform:scale(1.06);box-shadow:0 2px 8px var(--ag)}

/* 图标网格 */
#icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;max-height:240px;overflow-y:auto;margin-bottom:6px;background:var(--sf);padding:4px;border-radius:8px;border:1px solid var(--sb)}
.icon-item{background:var(--cd);border:2px solid transparent;border-radius:6px;cursor:pointer;padding:3px 2px;text-align:center;transition:.12s}
.icon-item:hover{border-color:var(--cb);background:var(--hv)}
.icon-item.sel{border-color:var(--ac);background:var(--hv);box-shadow:0 1px 6px var(--ag)}
.icon-item canvas{display:block;margin:0 auto 2px;image-rendering:pixelated}
.icon-item .iname{font-size:.46rem;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}

/* 图层 */
#layer-list{max-height:200px;overflow-y:auto}
.layer-item{display:flex;align-items:center;gap:3px;padding:5px 4px;border-radius:6px;cursor:pointer;font-size:.76rem;color:var(--t2)}
.layer-item:hover{background:var(--hv)}
.layer-item.sel{background:var(--tg);color:var(--tx)}
.ltype{background:var(--tg);border-radius:4px;padding:1px 5px;font-size:.62rem;min-width:26px;text-align:center;flex-shrink:0;color:var(--ac);font-weight:700}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px}
.lbtn{color:var(--t2);padding:1px 3px;cursor:pointer;font-size:.82rem;line-height:1;flex-shrink:0;border-radius:3px}
.lbtn:hover{color:var(--tx);background:var(--hv)}
.lbtn.del{color:var(--er)}
.lbtn.del:hover{background:rgba(200,0,0,.08)}

/* 按钮 */
.btn{display:block;width:100%;padding:7px 10px;border:1px solid var(--cb);border-radius:8px;
  color:var(--tx);background:var(--sf);cursor:pointer;font-size:.82rem;font-weight:600;
  margin-bottom:4px;text-align:center;transition:.15s;font-family:inherit}
.btn:hover{border-color:var(--ac);color:var(--ac);background:var(--hv)}
.btn.primary{background:linear-gradient(135deg,var(--ac),var(--a2));border-color:transparent;color:var(--bt);box-shadow:0 3px 12px var(--ag)}
.btn.primary:hover{filter:brightness(1.07);border-color:transparent;color:var(--bt)}
.btn.danger{background:var(--sf);border-color:var(--er);color:var(--er)}
.btn.danger:hover{background:rgba(200,0,0,.06)}
.btn.sml{font-size:.72rem;padding:3px 9px;width:auto;display:inline-block;margin-bottom:0}

.layer-item.hidden-layer .lname{opacity:.4;text-decoration:line-through}
.layer-item.locked-layer .lname{color:var(--ac)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--cd);color:var(--tx);padding:8px 20px;border-radius:20px;
  font-size:.83rem;display:none;z-index:999;pointer-events:none;
  border:1px solid var(--cb);box-shadow:var(--cs)}
/* Unified top links for canvas editor */
#topbar{overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#topbar::-webkit-scrollbar{display:none}
#topbar a.back{flex:0 0 auto;min-height:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 12px;border-radius:12px;font-size:.78rem;font-weight:800;line-height:1;box-shadow:0 4px 12px rgba(255,155,179,.08)}
#topbar a.back .ni{width:16px;min-width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-size:14px;line-height:1}
@media(max-width:720px){#topbar{gap:7px;padding:7px 10px}#topbar h1{font-size:.82rem}#topbar a.back{min-height:32px;padding:0 10px;font-size:.74rem}}
</style>
<style id="unified-shell-v2">
/* Unified app shell v2: keep page size, nav, cards and form rhythm consistent. */
body{overflow-y:scroll}
body .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important;margin:0 auto!important;padding:24px 0 36px!important}
body.page-upload .wrap{width:min(1180px,calc(100vw - 32px));max-width:1180px!important}
body.page-config .wrap,body.page-board .wrap{width:min(1380px,calc(100vw - 36px));max-width:1380px!important}
body.page-config .page{width:min(1180px,calc(100vw - 32px))!important;max-width:1180px!important;margin:24px auto 36px!important}
body.page-board{overflow:hidden}
body .hdr{width:100%;min-height:46px;margin:0 0 16px!important;align-items:center}
body .hdr .title{line-height:1.25}
body .nav{width:min(1180px,100%)!important;max-width:100%!important;margin:0 auto 20px!important;transform:none!important;justify-content:center!important}
body .nav a{flex:0 0 88px!important;width:88px!important;min-width:88px!important;max-width:88px!important;padding:0 6px!important;gap:5px!important;overflow:hidden!important}
body .card{border-radius:16px!important}
body.page-panel .card,body.page-task .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .wrap>.row,body.page-panel .wrap>.log,body.page-task .wrap>.row,body.page-task .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-panel .card .hd,body.page-task .card .hd{padding:20px 22px 12px!important}
body.page-panel .card .bd,body.page-task .card .bd{padding:18px 22px 22px!important}
body.page-panel .card .bd{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 18px;align-items:start}
body.page-panel .card .bd>.kv,body.page-panel .card .bd>.row,body.page-panel .card .bd>.log{grid-column:1/-1}
body.page-panel .card .bd>.form-row{margin-bottom:0!important}
body.page-panel select,body.page-panel input[type=text],body.page-panel input[type=password],body.page-panel input[type=number],body.page-panel textarea{max-width:none!important}
body.page-panel #cityResults{max-width:none!important}
body.page-task .wrap>.row{margin-top:16px}
body.page-upload .card,body.page-config .card{width:100%}
body.page-gallery .card,body.page-timetable .card{width:100%;margin-left:auto!important;margin-right:auto!important}
body.page-gallery .wrap>.row,body.page-gallery .wrap>.log,body.page-timetable .wrap>.row,body.page-timetable .wrap>.log{width:100%;margin-left:auto!important;margin-right:auto!important}
body .epd-credit{width:100%;max-width:100%!important;margin:0 auto!important;padding:8px 12px;border-top:1px solid var(--cb);font-size:12px;color:var(--t2);text-align:center;line-height:1.4;background:var(--cd);flex-shrink:0}
body .epd-credit strong{color:var(--tx);font-weight:700}
body .epd-credit a{color:var(--ac);font-weight:600;text-decoration:none}
body .epd-credit a:hover{text-decoration:underline}
@media(max-width:760px){body .wrap,body.page-upload .wrap{width:calc(100vw - 24px);padding:16px 0 28px!important}body.page-config .page{width:calc(100vw - 24px)!important;margin-top:16px!important}body.page-panel .card .bd{grid-template-columns:1fr}body .nav{margin-bottom:16px!important;justify-content:flex-start!important}}
</style>
</head>
<body class="page-shell page-wide page-board">

<!-- 顶部操作栏 -->
<div id="topbar">
  <h1>🎨 画布留言板</h1>
  <a class="back" href="/"><span class="ni">🖼</span> 上传</a>
  <a class="back" href="/message"><span class="ni">💬</span> 文字留言</a>
  <a class="back" href="/weather"><span class="ni">🌤</span> 天气</a>
  <a class="back" href="/news"><span class="ni">📰</span> 新闻</a>
  <a class="back" href="/clock"><span class="ni">🕐</span> 时钟</a>
  <a class="back" href="/config"><span class="ni">⚙</span> 设备配置</a>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="undo()" id="btn-undo" disabled title="Ctrl+Z">↩ 撤销</button>
  <button class="tb-btn" onclick="redo()" id="btn-redo" disabled title="Ctrl+Y">↪ 重做</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="duplicateSelected()" title="Ctrl+D">⧉ 复制</button>
  <button class="tb-btn" onclick="deleteSelected()" title="Delete">🗑 删除</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveLayout()">💾 保存</button>
  <button class="tb-btn" onclick="loadLayout()">📂 重载</button>
  <button class="tb-btn" onclick="manualCompact()" title="手动化简所有笔画以减小布局体积">🪄 化简</button>
  <span id="save-status" style="font-size:.72rem;color:var(--t2);padding:0 4px;white-space:nowrap"></span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-grid" onclick="toggleGrid()" title="网格吸附">⊞ 网格</button>
  <button class="tb-btn" onclick="showTemplates()" title="模板预设">📋 模板</button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" id="btn-show-epd" onclick="showOnEPD()">🖨 发送到墨水屏</button>
</div>

<div id="app">

<!-- 工具栏 -->
<div id="toolbar">
  <div class="tool-btn active" data-tool="select" title="选择/移动 (V)">↖<span class="tlbl">选择</span></div>
  <div class="tool-sep"></div>
  <div class="tool-btn" data-tool="pencil" title="铅笔 (P)">✏<span class="tlbl">铅笔</span></div>
  <div class="tool-btn" data-tool="text"   title="文字 (T)">T<span class="tlbl">文字</span></div>
  <div class="tool-btn" data-tool="rect"   title="矩形 (R)">▭<span class="tlbl">矩形</span></div>
  <div class="tool-btn" data-tool="ellipse"title="椭圆 (E)">◯<span class="tlbl">椭圆</span></div>
  <div class="tool-btn" data-tool="line"   title="直线 (L)">╱<span class="tlbl">直线</span></div>
  <div class="tool-btn" data-tool="icon"   title="图标 (I)">★<span class="tlbl">图标</span></div>
  <div class="tool-btn" data-tool="image"  title="图片 (G)">🖼<span class="tlbl">图片</span></div>
</div>

<!-- 画布 -->
<div id="canvas-wrap">
  <div id="canvas-outer">
    <canvas id="canvas" width="400" height="300"></canvas>
    <canvas id="overlay" width="400" height="300" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
  </div>
</div>

<!-- 右侧面板 -->
<div id="sidebar">

  <!-- 颜色 -->
  <div class="panel">
    <h3>颜色</h3>
    <div class="color-row">
      <div class="color-btn black sel" data-color="0">黑</div>
      <div class="color-btn red"       data-color="1">红</div>
      <div class="color-btn white"     data-color="2">白</div>
    </div>
  </div>

  <!-- 铅笔 -->
  <div class="panel" id="panel-pencil" style="display:none">
    <h3>铅笔</h3>
    <label>笔刷大小 <b id="sw-pencil-lbl" style="color:#e94560">2px</b></label>
    <input type="range" id="sw-pencil" min="1" max="16" value="2">
    <div class="hint">按住鼠标拖拽自由绘制</div>
  </div>

  <!-- 文字 -->
  <div class="panel" id="panel-text" style="display:none">
    <h3>文字</h3>
    <label>内容</label>
    <textarea id="txt-content" rows="3" style="resize:vertical"></textarea>
    <label>字体</label>
    <select id="txt-font-family">
      <option value="LXGW 975 Yuan SC, 霞鹜975圆体 SC, Microsoft YaHei UI, Microsoft YaHei, sans-serif">圆体</option>
      <option value="SimSun, STSong, Songti SC, serif">宋体 / 明体</option>
      <option value="FangSong, STFangsong, 仿宋, serif">仿宋</option>
      <option value="KaiTi, STKaiti, Kaiti SC, 楷体, serif">楷体</option>
      <option value="SimHei, STXihei, Heiti SC, Microsoft YaHei, sans-serif">黑体</option>
      <option value="Microsoft YaHei UI, Microsoft YaHei, sans-serif">微软雅黑</option>
      <option value="STXingkai, 华文行楷, Xingkai SC, KaiTi, serif">行楷 / 书法</option>
      <option value="STXinwei, 华文新魏, Weibei SC, KaiTi, serif">新魏</option>
      <option value="STLiti, LiSu, 隶书, serif">隶书</option>
      <option value="Hannotate SC, Wawati SC, Yuppy SC, Kaiti SC, serif">手写风格</option>
      <option value="YouYuan, 幼圆, Microsoft YaHei UI, sans-serif">幼圆</option>
    </select>
    <div class="row2">
      <div><label>字重</label><select id="txt-font-weight"><option value="400">常规</option><option value="600" selected>半粗</option><option value="700">粗体</option><option value="900">特粗</option></select></div>
      <div><label>自定义字体</label><input type="text" id="txt-custom-font" placeholder="本机已安装字体名"></div>
    </div>
    <label>字号 <b id="scale-lbl" style="color:#e94560">1档 / 16px</b>（1–6）</label>
    <input type="range" id="txt-scale" min="1" max="6" value="1">
    <div class="hint">发送到墨水屏时使用网页字体渲染成图片，不再走固件字库。</div>
  </div>

  <!-- 形状（矩形/椭圆） -->
  <div class="panel" id="panel-shape" style="display:none">
    <h3>形状</h3>
    <label><input type="checkbox" id="shape-fill"> 填充（不填充则描边）</label>
    <div class="row2" style="margin-top:6px">
      <div><label>宽/半径X</label><input type="number" id="shape-w" value="60" min="1"></div>
      <div><label>高/半径Y</label><input type="number" id="shape-h" value="40" min="1"></div>
    </div>
    <div id="rect-radius-row" style="margin-bottom:4px">
      <label>圆角半径 <b id="radius-lbl" style="color:#e94560">0px</b></label>
      <input type="range" id="shape-radius" min="0" max="60" value="0">
    </div>
    <label>描边宽 <b id="sw-shape-lbl" style="color:#e94560">1px</b></label>
    <input type="range" id="sw-shape" min="1" max="12" value="1">
  </div>

  <!-- 直线 -->
  <div class="panel" id="panel-line" style="display:none">
    <h3>直线</h3>
    <div class="row2">
      <div><label>起点 X1</label><input type="number" id="line-x1" value="0"></div>
      <div><label>起点 Y1</label><input type="number" id="line-y1" value="0"></div>
    </div>
    <div class="row2">

/* 位图渲染：用于图标网格预览（dispSize 可为任意整数，用块边界正确映射） */
function bmpToCanvas(name, dispSize, fgR, fgG, fgB) {
    const data = BUILTIN_BITMAPS[name];
    const oc = document.createElement('canvas');
    oc.width = oc.height = dispSize;
    const cx = oc.getContext('2d');
    const id = cx.createImageData(dispSize, dispSize);
    for (let row = 0; row < 16; row++) {
        const word = (data[row*2] << 8) | data[row*2+1];
        const y0 = Math.round(row * dispSize / 16);
        const y1 = Math.round((row + 1) * dispSize / 16);
        for (let col = 0; col < 16; col++) {
            const on = (word >> (15-col)) & 1;
            const x0 = Math.round(col * dispSize / 16);
            const x1 = Math.round((col + 1) * dispSize / 16);
            for (let py = y0; py < y1; py++) for (let px = x0; px < x1; px++) {
                const i = (py * dispSize + px) * 4;
                id.data[i]   = on ? fgR : 240;
                id.data[i+1] = on ? fgG : 240;
                id.data[i+2] = on ? fgB : 240;
                id.data[i+3] = 255;
            }
        }
    }
    cx.putImageData(id, 0, 0);
    return oc;
}

/* 位图渲染：绘制到主 canvas（背景透明） */
function drawBmpOnCtx(ctx2d, data, x, y, scale, fgR, fgG, fgB) {
    if (!data) return;
    const oc = document.createElement('canvas');
    const sz = 16 * scale;
    oc.width = oc.height = sz;
    const cx = oc.getContext('2d');
    const id = cx.createImageData(sz, sz);
    for (let row = 0; row < 16; row++) {
        const word = (data[row*2] << 8) | data[row*2+1];
        for (let col = 0; col < 16; col++) {
            const on = (word >> (15-col)) & 1;
            for (let dy = 0; dy < scale; dy++) for (let dx = 0; dx < scale; dx++) {
                const i = ((row*scale+dy)*sz + col*scale+dx) * 4;
                id.data[i]   = on ? fgR : 255;
                id.data[i+1] = on ? fgG : 255;
                id.data[i+2] = on ? fgB : 255;
                id.data[i+3] = on ? 255 : 0;
            }
        }
    }
    cx.putImageData(id, 0, 0);
    ctx2d.drawImage(oc, x, y);
}

/* 后端 CANVAS_LAYOUT_MAX_BYTES = 12288，留 256B 安全裕度 */
const LAYOUT_LIMIT_BYTES = 12288;
const LAYOUT_WARN_BYTES  = 11000;

function estimateSize() { return new Blob([JSON.stringify(elements)]).size; }

function setSaveStatus(s) {
    const el = document.getElementById('save-status');
    const sz = estimateSize();
    const pct = Math.min(100, Math.round(sz / LAYOUT_LIMIT_BYTES * 100));
    let warn = '';
    if (sz >= LAYOUT_LIMIT_BYTES) warn = ' · ⚠ 超限';
    else if (sz >= LAYOUT_WARN_BYTES) warn = ' · ⚠ 即将超限';
    el.textContent = `${s} · ${(sz/1024).toFixed(1)}/${(LAYOUT_LIMIT_BYTES/1024).toFixed(0)}KB (${pct}%)${warn}`;
    el.style.color = sz >= LAYOUT_LIMIT_BYTES ? '#e33'
                   : sz >= LAYOUT_WARN_BYTES  ? '#e80'
                   : 'var(--t2)';
}

function currentLayoutJson() {
    return JSON.stringify(elements);
}

function markSavedJson(json) {
    _lastSavedJson = json ?? currentLayoutJson();
}

function prepareLayoutForSave() {
    if (estimateSize() < LAYOUT_LIMIT_BYTES) return false;
    compactAllPaths(LAYOUT_WARN_BYTES);
    render(); updateLayerList();
    toast('🪄 路径已自动化简以适配 12KB 上限');
    return true;
}

async function persistLayout(opts) {
    opts = opts || {};
    clearTimeout(_autoSaveTimer);

    if (_saveInFlight) {
        _saveQueued = true;
        await _saveInFlight;
        if (opts.silent && currentLayoutJson() !== _lastSavedJson) {
            scheduleAutoSave(AUTO_SAVE_DELAY_MS);
            return { ok:true, skipped:true, queued:true };
        }
        if (opts.force || currentLayoutJson() !== _lastSavedJson) {
            return persistLayout(opts);
        }
        return { ok:true, skipped:true, queued:true };
    }

    prepareLayoutForSave();
    const json = currentLayoutJson();
    if (!opts.force && json === _lastSavedJson) {
        setSaveStatus('✓ 已保存');
        return { ok:true, skipped:true };
    }

    setSaveStatus(opts.silent ? '自动保存中…' : '保存中…');
    _saveQueued = false;
    _saveInFlight = (async () => {
        try {
            const r = await fetch('/canvas_layout', epdFetchOpts({
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:json
            }));
            if (r.ok) {
                markSavedJson(json);
                setSaveStatus('✓ 已保存');
                return { ok:true };
            }
            const msg = await r.text().catch(()=>String(r.status));
            setSaveStatus(`⚠ ${r.status}`);
            return { ok:false, status:r.status, msg };
        } catch(e) {
            setSaveStatus('⚠ 网络错误');
            return { ok:false, msg:String(e && e.message ? e.message : e) };
        }
    })();

    try {
        const res = await _saveInFlight;
        if (_saveQueued && currentLayoutJson() !== _lastSavedJson) scheduleAutoSave(AUTO_SAVE_DELAY_MS);
        return res;
    } finally {
        _saveInFlight = null;
    }
}

/* Ramer–Douglas–Peucker 路径化简：tolerance 单位为像素。
 * tol=1.5 通常把自由绘图的点数压到原来的 10~30%，肉眼基本无差。 */
function _rdpPerp(p, a, b) {
    const dx = b[0]-a[0], dy = b[1]-a[1];
    if (dx===0 && dy===0) return Math.hypot(p[0]-a[0], p[1]-a[1]);
    const t = ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / (dx*dx + dy*dy);
    const px = a[0] + t*dx, py = a[1] + t*dy;
    return Math.hypot(p[0]-px, p[1]-py);
}
function simplifyPath(pts, tol) {
    if (!pts || pts.length < 3) return pts || [];
    const a = pts[0], b = pts[pts.length-1];
    let dmax = 0, idx = 0;
    for (let i = 1; i < pts.length-1; i++) {
        const d = _rdpPerp(pts[i], a, b);
        if (d > dmax) { dmax = d; idx = i; }
    }
    if (dmax > tol) {
        const left  = simplifyPath(pts.slice(0, idx+1), tol);
        const right = simplifyPath(pts.slice(idx), tol);
        return left.slice(0, -1).concat(right);
    }
    return [a.slice(), b.slice()];
}
/* 整数化 + 兜底化简全部 path，用渐进容差至少压到目标字节以下。 */
function compactAllPaths(targetBytes) {
    let tol = 1.5;
    while (estimateSize() > targetBytes && tol <= 6) {
        for (const el of elements) {
            if (el.type === 'path' && el.pts && el.pts.length > 4) {
                el.pts = simplifyPath(el.pts, tol).map(p => [Math.round(p[0]), Math.round(p[1])]);
            }
        }
        tol += 1.5;
    }
}
/* 手动化简：tol=1.5（与抬笔时一致）一刀切，再整数化 */
function manualCompact() {
    const before = estimateSize();
    let totalBefore = 0, totalAfter = 0;
    for (const el of elements) {
        if (el.type === 'path' && el.pts && el.pts.length > 2) {
            totalBefore += el.pts.length;
            el.pts = simplifyPath(el.pts, 1.5).map(p => [Math.round(p[0]), Math.round(p[1])]);
            totalAfter += el.pts.length;
        }
    }
    const after = estimateSize();
    render(); updateLayerList(); snapshot();
    if (totalBefore === 0) {
        toast('没有可化简的笔画');
    } else {
        toast(`🪄 ${totalBefore} → ${totalAfter} 点 · ${(before/1024).toFixed(1)} → ${(after/1024).toFixed(1)} KB`);
    }
}

function scheduleAutoSave(delayMs) {
    setSaveStatus('未保存，停止操作后自动保存…');
    clearTimeout(_autoSaveTimer);
    const delay = Math.max(1000, delayMs || AUTO_SAVE_DELAY_MS);
    _autoSaveTimer = setTimeout(async () => {
        const res = await persistLayout({ silent:true });
        if (!res.ok && res.msg) toast('自动保存失败: ' + res.msg);
    }, delay);
}
function snapshot(noAutoSave) {
    history.splice(histIdx + 1);
    history.push(JSON.stringify(elements));
    if (history.length > 60) history.shift();
    histIdx = history.length - 1;
    updateUndoRedo();
    if (!noAutoSave) scheduleAutoSave();
}
function undo() {
    if (histIdx <= 0) return;
    histIdx--;
    elements = JSON.parse(history[histIdx]);
    selected = -1;
    render(); updateLayerList(); updateUndoRedo();
}
function redo() {
    if (histIdx >= history.length - 1) return;
    histIdx++;
    elements = JSON.parse(history[histIdx]);
    selected = -1;
    render(); updateLayerList(); updateUndoRedo();
}
function updateUndoRedo() {
    document.getElementById('btn-undo').disabled = histIdx <= 0;
    document.getElementById('btn-redo').disabled = histIdx >= history.length - 1;
}

document.getElementById('icon-file-input').onchange = async function() {
    const f = this.files[0]; if (!f) return;
    const defName = f.name.replace(/\.[^.]+$/,'').replace(/[^A-Za-z0-9_-]/g,'_').slice(0,20);
    const name = prompt('图标名称（字母/数字/下划线/减号）：', defName);
    if (!name || !/^[A-Za-z0-9_-]+$/.test(name)) { toast('名称无效'); this.value=''; return; }

    let body;
    if (f.name.endsWith('.bin')) {
        const buf = await f.arrayBuffer();
        if (buf.byteLength !== 32) { toast('文件必须是 32 字节'); this.value=''; return; }
        body = buf;
    } else {
        /* 图片文件：缩放到 16×16，抖动转 1-bit */
        toast('正在转换图标…');
        body = await new Promise((resolve, reject) => {
            const url = URL.createObjectURL(f);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(url);
                const oc = document.createElement('canvas');
                oc.width = oc.height = 16;
                const cx = oc.getContext('2d');
                cx.fillStyle = '#fff'; cx.fillRect(0,0,16,16);
                cx.drawImage(img, 0, 0, 16, 16);
                const id = cx.getImageData(0, 0, 16, 16);
                const gray = new Float32Array(256);
                for (let i = 0; i < 256; i++)
                    gray[i] = 0.299*id.data[i*4] + 0.587*id.data[i*4+1] + 0.114*id.data[i*4+2];
                resolve(floydSteinberg(gray, 16, 16).buffer);
            };
            img.onerror = reject;
            img.src = url;
        });
    }
    try {
        const r = await fetch('/canvas_icon_upload?name='+encodeURIComponent(name),
            epdFetchOpts({method:'POST', headers:{'Content-Type':'application/octet-stream'}, body}));
        if (r.ok) { toast('图标已上传: '+name); await loadUserIcons(); buildIconGrid(); }
        else toast('上传失败: '+r.status);
    } catch(e) { toast('上传失败'); }
    this.value='';
};

/* ═══════════════════════════════════════════════
   图片：Floyd-Steinberg 抖动 + 1-bit 编码
═══════════════════════════════════════════════ */
function floydSteinberg(gray, w, h, opts) {
    opts = opts || {};
    const threshold = Math.max(0, Math.min(255, opts.threshold ?? 128));
    const strength = Math.max(0, Math.min(2, opts.strength ?? 1));
    const buf = new Float32Array(gray);
    const stride = Math.ceil(w / 8);
    const result = new Uint8Array(stride * h);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            const old = Math.max(0, Math.min(255, buf[idx]));
            const nv  = old < threshold ? 0 : 255;
            buf[idx]  = nv;
            const err = (old - nv) * strength;
            if (x + 1 < w)           buf[idx + 1]     += err * 7 / 16;
            if (y + 1 < h) {
                if (x > 0)            buf[idx + w - 1] += err * 3 / 16;
                                      buf[idx + w]     += err * 5 / 16;
                if (x + 1 < w)        buf[idx + w + 1] += err * 1 / 16;
            }
        }
    }
    for (let y = 0; y < h; y++)
        for (let x = 0; x < w; x++)
            if (buf[y * w + x] < 128)
                result[y * stride + (x >> 3)] |= (0x80 >> (x & 7));
    return result;
}

function packPlane(mask, w, h) {
    const stride = Math.ceil(w / 8);
    const out = new Uint8Array(stride * h);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            if (mask[y * w + x]) out[y * stride + (x >> 3)] |= (0x80 >> (x & 7));
        }
    }
    return out;
}

function quantizeBwrFromImageData(id, w, h, opts) {
    const threshold = Math.max(0, Math.min(255, opts.threshold ?? 128));
    const strength = Math.max(0, Math.min(2, opts.strength ?? 1));
    const contrast = Math.max(0.2, Math.min(3, opts.contrast ?? 1.2));
    const redSensitivity = Math.max(0, Math.min(1, opts.redSensitivity ?? 0.35));
    const invert = !!opts.invert;
    const gray = new Float32Array(w * h);
    const redScore = new Float32Array(w * h);
    for (let i = 0; i < w * h; i++) {
        let r = id.data[i*4], g = id.data[i*4+1], b = id.data[i*4+2];
        if (invert) { r = 255 - r; g = 255 - g; b = 255 - b; }
        let y = 0.299 * r + 0.587 * g + 0.114 * b;
        y = Math.max(0, Math.min(255, (y - 128) * contrast + 128));
        gray[i] = y;
        const warm = r - Math.max(g, b) * (0.72 + redSensitivity * 0.18);
        const saturation = r - Math.min(g, b);
        redScore[i] = warm + saturation * 0.35;
    }

    const blackMask = new Uint8Array(w * h);
    const redMask = new Uint8Array(w * h);
    const redGate = 80 - redSensitivity * 55;
    const redLightGate = 230 - redSensitivity * 80;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            const old = Math.max(0, Math.min(255, gray[idx]));
            const isRed = redScore[idx] > redGate && old < redLightGate;
            if (isRed) {
                redMask[idx] = 1;
                gray[idx] = 255; // 红色区域不再参与黑色抖动，避免红黑混杂。
                continue;
            }
            const nv = old < threshold ? 0 : 255;
            gray[idx] = nv;
            if (nv === 0) blackMask[idx] = 1;
            const err = (old - nv) * strength;
            if (x + 1 < w) gray[idx + 1] += err * 7 / 16;
            if (y + 1 < h) {
                if (x > 0) gray[idx + w - 1] += err * 3 / 16;
                gray[idx + w] += err * 5 / 16;
                if (x + 1 < w) gray[idx + w + 1] += err * 1 / 16;
            }
        }
    }
    return { black:packPlane(blackMask, w, h), red:packPlane(redMask, w, h) };
}

function getImageConvertOptions() {
    const threshold = +(document.getElementById('img-threshold')?.value || 128);
    const contrast = (+(document.getElementById('img-contrast')?.value || 120)) / 100;

}

async function imageFileTo1bit(file, maxW, maxH) {
    return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
            URL.revokeObjectURL(url);
            const opt = getImageConvertOptions();
            let w = img.width, h = img.height;
            let sx = 0, sy = 0, sw = img.width, sh = img.height;
            if (opt.fit === 'stretch') {
                w = maxW; h = maxH;
            } else if (opt.fit === 'cover') {
                w = maxW; h = maxH;
                const srcRatio = img.width / img.height;
                const dstRatio = maxW / maxH;
                if (srcRatio > dstRatio) {
                    sw = Math.round(img.height * dstRatio);
                    sx = Math.round((img.width - sw) / 2);
                } else {
                    sh = Math.round(img.width / dstRatio);
                    sy = Math.round((img.height - sh) / 2);
                }
            } else {
                const scaleW = maxW / w, scaleH = maxH / h;
                if (scaleW < 1 || scaleH < 1) {
                    const sc = Math.min(scaleW, scaleH);
                    w = Math.max(1, Math.round(w * sc));
                    h = Math.max(1, Math.round(h * sc));
                }
            }
            const oc = document.createElement('canvas');
            oc.width = w; oc.height = h;
            const cx = oc.getContext('2d', { willReadFrequently: true });
            /* 关闭平滑：双线性插值会让中灰变多，1-bit 抖动后发糊、与设备端最近邻缩放观感不一致 */
            cx.imageSmoothingEnabled = false;
            cx.fillStyle = '#fff'; cx.fillRect(0, 0, w, h);
            cx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
            const id = cx.getImageData(0, 0, w, h);
            const planes = quantizeBwrFromImageData(id, w, h, opt);
            resolve({ w, h, data: planes.black, red: planes.red, bwr: true });
        };
        img.onerror = reject;
        img.src = url;
    });
}

function drawBmpRaw(ctx2d, imgData, x, y, dispW, dispH, fgColor) {
    if (!imgData) return;
    const {w, h, data, red, _cacheKey} = imgData;
    const fg = fgColor || '#000';
    const key = (_cacheKey || (w + 'x' + h)) + '_' + fg + '_' + (red ? 'bwr' : 'bw');
    let oc = BMP_CACHE[key];
    if (!oc) {
        let fr=0,fg2=0,fb2=0;
        if (!red && (fg==='#c0392b'||fg==='red')){fr=192;fg2=57;fb2=43;}
        else if (!red && (fg==='#fff'||fg==='white')){fr=255;fg2=255;fb2=255;}
        const stride = Math.ceil(w / 8);
        oc = document.createElement('canvas');
        oc.width = w; oc.height = h;
        const cx = oc.getContext('2d');
        const id = cx.createImageData(w, h);
        for (let row = 0; row < h; row++) {
            for (let col = 0; col < w; col++) {
                const byteIdx = row * stride + (col >> 3);
                const bitMask = 7 - (col & 7);
                const on = (data[byteIdx] >> bitMask) & 1;
                const isRed = red ? ((red[byteIdx] >> bitMask) & 1) : 0;
                const i = (row * w + col) * 4;
                if (isRed) { id.data[i]=192; id.data[i+1]=57; id.data[i+2]=43; id.data[i+3]=255; }
                else if (on) { id.data[i]=fr; id.data[i+1]=fg2; id.data[i+2]=fb2; id.data[i+3]=255; }
                else    { id.data[i]=255; id.data[i+1]=255; id.data[i+2]=255; id.data[i+3]=255; }
            }
        }
        cx.putImageData(id, 0, 0);
        BMP_CACHE[key] = oc;
    }
    ctx2d.imageSmoothingEnabled = false;
    ctx2d.drawImage(oc, x, y, dispW ?? w, dispH ?? h);
}

function quantizeBoardSnapshotCanvas(c) {
    const ctx2d = c.getContext('2d', { willReadFrequently: true });
    const im = ctx2d.getImageData(0, 0, c.width, c.height);
    const d = im.data;
    for (let i = 0; i < d.length; i += 4) {
        const a = d[i + 3];
        if (a <= 16) {
            d[i] = d[i + 1] = d[i + 2] = 255;
            d[i + 3] = 255;
            continue;
        }
        const r = d[i], g = d[i + 1], b = d[i + 2];
        const redLike = r > 130 && r > g * 1.25 && r > b * 1.25;
        const gray = (r * 30 + g * 59 + b * 11) / 100;
        if (redLike) {
            d[i] = 192; d[i + 1] = 57; d[i + 2] = 43; d[i + 3] = 255;
        } else if (gray < 190) {
            d[i] = d[i + 1] = d[i + 2] = 0; d[i + 3] = 255;
        } else {
            d[i] = d[i + 1] = d[i + 2] = 255; d[i + 3] = 255;
        }
    }
    ctx2d.putImageData(im, 0, 0);
}

function renderBoardSnapshotCanvas() {
    const oc = document.createElement('canvas');
    oc.width = EPD_W;
    oc.height = EPD_H;
    const cx = oc.getContext('2d');
    cx.fillStyle = '#fff';
    cx.fillRect(0, 0, oc.width, oc.height);
    elements.forEach(el => {
        if (el.hidden) return;
        cx.save();
        renderElement(cx, el, 1);
        cx.restore();
    });
    quantizeBoardSnapshotCanvas(oc);
    return oc;
}

function boardSnapshotBlob() {
    return new Promise((resolve, reject) => {
        const oc = renderBoardSnapshotCanvas();
        oc.toBlob(b => b ? resolve(b) : reject(new Error('snapshot export failed')), 'image/png');
    });
}
